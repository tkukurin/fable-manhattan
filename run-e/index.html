<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MANHATTAN — one island, alive</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0b0e14;font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  #c{position:fixed;inset:0;display:block}
  #ui{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:10px;align-items:center;
      background:rgba(12,15,22,.72);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 12px;
      backdrop-filter:blur(10px);color:#cfd6e4;font-size:11px;user-select:none;transition:opacity .5s;z-index:10;flex-wrap:wrap;justify-content:center;max-width:96vw}
  #ui.faded{opacity:0;pointer-events:none}
  #ui .grp{display:flex;gap:4px;align-items:center}
  #ui .lbl{opacity:.55;margin-right:2px;font-size:10px;letter-spacing:.08em;text-transform:uppercase}
  #ui button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#dfe6f2;border-radius:7px;
      padding:4px 9px;font-size:11px;cursor:pointer;white-space:nowrap}
  #ui button:hover{background:rgba(255,255,255,.14)}
  #ui button.on{background:rgba(255,190,90,.22);border-color:rgba(255,190,90,.5);color:#ffd9a0}
  #ui input[type=range]{width:64px;accent-color:#e8a84c;height:12px}
  #ui select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#dfe6f2;border-radius:7px;padding:3px 4px;font-size:11px}
  #ui .sep{width:1px;height:18px;background:rgba(255,255,255,.12)}
  #fps{position:fixed;right:10px;top:8px;color:rgba(210,220,240,.5);font-size:10px;z-index:10;font-variant-numeric:tabular-nums}
  #hint{position:fixed;left:50%;top:10px;transform:translateX(-50%);color:rgba(220,228,245,.42);font-size:11px;z-index:10;transition:opacity 1s;pointer-events:none}
  .bar{position:fixed;left:0;right:0;height:0;background:#000;z-index:5;transition:height .6s cubic-bezier(.4,0,.2,1)}
  #barT{top:0}#barB{bottom:0}
  body.photo .bar{height:7vh}
  body.photo #ui,body.photo #fps,body.photo #hint{opacity:0!important;pointer-events:none}
  #load{position:fixed;inset:0;background:#0b0e14;z-index:50;display:flex;align-items:center;justify-content:center;color:#8fa0bd;font-size:12px;letter-spacing:.25em;transition:opacity .8s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="load">BUILDING THE ISLAND…</div>
<div class="bar" id="barT"></div><div class="bar" id="barB"></div>
<div id="hint">drag&nbsp;orbit&nbsp;·&nbsp;right-drag&nbsp;pan&nbsp;·&nbsp;scroll&nbsp;dive&nbsp;·&nbsp;keys&nbsp;1–6&nbsp;views&nbsp;·&nbsp;G/N/D&nbsp;light&nbsp;·&nbsp;R&nbsp;reset&nbsp;·&nbsp;P&nbsp;photo</div>
<div id="fps"></div>
<div id="ui">
  <div class="grp"><span class="lbl">View</span>
    <button data-v="0" class="on">Island</button><button data-v="1">Harbor</button><button data-v="2">Canyon</button>
    <button data-v="3">Park</button><button data-v="4">Bridges</button><button data-v="5">GWB</button>
  </div><div class="sep"></div>
  <div class="grp"><span class="lbl">Light</span>
    <button data-l="golden" class="on">Golden</button><button data-l="noon">Noon</button><button data-l="dusk">Dusk</button>
  </div><div class="sep"></div>
  <div class="grp"><span class="lbl">Traffic</span><input type="range" id="trf" min="0" max="150" value="100"></div>
  <div class="grp"><span class="lbl">Rivers</span><input type="range" id="bts" min="0" max="150" value="100"></div>
  <div class="sep"></div>
  <div class="grp"><span class="lbl">Quality</span>
    <select id="qual"><option value="auto" selected>Auto</option><option value="3">Ultra</option><option value="2">High</option><option value="1">Medium</option><option value="0">Low</option></select>
  </div><div class="sep"></div>
  <div class="grp"><button id="photo">Photo</button><button id="reset">Reset</button></div>
</div>
<script>window.APP = {};</script>
<script src="js/geo.js"></script>
<script src="js/shaders.js"></script>
<script src="js/city.js"></script>
<script src="js/landmarks.js"></script>
<script src="js/life.js"></script>
<script src="js/main.js"></script>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.164.1/build/three.module.js","three/addons/":"https://unpkg.com/three@0.164.1/examples/jsm/"}}
</script>
<script type="module">
  import * as THREE from 'three';
  import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
  window.APP.main(THREE, OrbitControls);
</script>
<!-- viewer tweak: controls collapsed by default, arrow toggle -->
<style>
  #ui, #hint, #fps { transition: opacity .25s ease; }
  body.hud-off #ui, body.hud-off #hint, body.hud-off #fps {
    opacity: 0 !important; pointer-events: none !important; }
  #hudToggle { position: fixed; right: 10px; bottom: 10px; z-index: 99;
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.25); background: rgba(10,12,16,.55);
    color: rgba(255,255,255,.85); font: 13px/28px sans-serif; text-align: center;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    backdrop-filter: blur(4px); opacity: .5; transition: opacity .2s, transform .25s; }
  #hudToggle:hover { opacity: 1; }
  body:not(.hud-off) #hudToggle { transform: rotate(180deg); opacity: .8; }
</style>
<script>
(function () {
  document.body.classList.add('hud-off');
  var b = document.createElement('div');
  b.id = 'hudToggle';
  b.title = 'Show / hide controls';
  b.textContent = '▴';
  b.addEventListener('pointerdown', function (e) { e.stopPropagation(); });
  b.addEventListener('click', function (e) {
    e.stopPropagation();
    document.body.classList.toggle('hud-off');
  });
  document.body.appendChild(b);
})();
</script>

</body>
</html>
