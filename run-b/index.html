<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as BGU from 'three/addons/utils/BufferGeometryUtils.js';

/* ============================================================
   MANHATTAN — the whole island, alive.
   World units: meters. North = -Z. East = +X. Battery at origin.
   ============================================================ */

// ---------- utils ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const R = mulberry32(1789);
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(x,a,b)=>Math.min(b,Math.max(a,x));
const smooth=(t)=>t*t*(3-2*t);
function hash2(a,b){let h=Math.sin(a*127.1+b*311.7)*43758.5453;return h-Math.floor(h);}

// ---------- geography: centerline + half-width of the island ----------
const GEO=[ // [v(north,m), centerX, halfWidth]
 [-200,0,0],[0,0,340],[600,60,950],[1600,160,1250],[3000,320,1520],
 [4200,480,1800],[5600,660,1760],[7600,950,1520],[9600,1200,1420],
 [11700,1500,1320],[12900,1700,1260],[14500,2000,1020],[15300,2150,860],
 [17100,2500,720],[19000,2900,620],[20300,3200,500],[21200,3420,260],[21600,3510,0]];
function geoAt(v){
  if(v<=GEO[0][0])return{cx:GEO[0][1],hw:GEO[0][2]};
  for(let i=0;i<GEO.length-1;i++){const a=GEO[i],b=GEO[i+1];
    if(v<=b[0]){const t=smooth((v-a[0])/(b[0]-a[0]));return{cx:lerp(a[1],b[1],t),hw:lerp(a[2],b[2],t)};}}
  const e=GEO[GEO.length-1];return{cx:e[1],hw:e[2]};
}
const cxAt=v=>geoAt(v).cx, hwAt=v=>geoAt(v).hw;
function gridBasis(v){ // tangent (northbound) & east normal of curved grid
  const d=60,x0=cxAt(v-d),x1=cxAt(v+d);
  let tx=(x1-x0)/(2*d),tz=-1;const l=Math.hypot(tx,tz);tx/=l;tz/=l;
  return{tx,tz,nx:-tz,nz:tx}; // n = east
}
function gp(u,v){ // grid point -> world x,z
  const g=geoAt(v),b=gridBasis(v);
  return{x:g.cx+b.nx*u,z:-v+b.nz*u};
}
function gAngle(v){const b=gridBasis(v);return Math.atan2(-b.nz,b.nx);} // rotY: local+x -> east normal

// Broadway polyline in (u,v)
const BWY=[[150,-200],[240,1500],[330,2900],[430,4300],[335,4720],[80,5620],[-180,6480],[-440,7620],[-520,9000],[-560,11700],[-620,12900],[-500,14500],[-300,17000],[-150,19500],[-80,21100]];
function distToBroadway(u,v){
  let m=1e9;
  for(let i=0;i<BWY.length-1;i++){const a=BWY[i],b=BWY[i+1];
    const dx=b[0]-a[0],dv=b[1]-a[1],L2=dx*dx+dv*dv;
    let t=((u-a[0])*dx+(v-a[1])*dv)/L2;t=clamp(t,0,1);
    const px=a[0]+dx*t-u,pv=a[1]+dv*t-v;m=Math.min(m,px*px+pv*pv);}
  return Math.sqrt(m);
}

// green zones (in u,v): [u0,u1,v0,v1,kind] kind: 0 lawn,1 forest,2 cemetery
const PARK={u0:-440,u1:340,v0:7600,v1:11700};
const GREENS=[
 [-440,340,7600,11700,0],              // Central Park
 [-1900,-1500,7600,15400,0],           // Riverside strip (clipped by shore)
 [-820,-600,11750,12750,1],            // Morningside
 [-760,-540,15420,15820,2],            // Trinity Church cemetery
 [-1500,-350,17550,18650,1],           // Fort Tryon
 [-1400,-60,20050,21500,1],            // Inwood Hill
 [700,1150,15250,18600,1],             // Highbridge strip (clipped by shore)
 [60,360,4360,4600,0],                 // Union Sq-ish
 [-260,60,4830,5060,0],                // Madison Sq
 [-320,-40,5560,5700,0],               // Bryant Park + library
 [-120,240,3350,3650,0],               // Washington Sq
 [700,1050,3050,3350,0],               // Tompkins Sq
 [560,900,12150,12500,0],              // Marcus Garvey
 [-540,-140,13050,13400,0],            // St Nicholas Park
 [900,1300,6900,7300,0],               // hospital lawns / east
];
function greenAt(u,v){
  for(const g of GREENS){if(u>=g[0]&&u<=g[1]&&v>=g[2]&&v<=g[3])return g[4]+1;}
  return 0;
}

// ---------- landmarks (exclusion + instanced tiers) ----------
const EXCL=[]; // {u,v,r}
function excl(u,v,r){EXCL.push({u,v,r:r*r});}
function isExcluded(u,v){for(const e of EXCL){const du=u-e.u,dv=v-e.v;if(du*du+dv*dv<e.r)return true;}return false;}

// building records
const B=[]; // {x,z,rot,w,d,h,y,type,seed}
// type: 0 glass, 1 prewar masonry, 2 tenement brick, 3 terracotta/limestone, 4 boro/dim
function pushB(u,v,w,d,h,type,y=0,rotJ=0){
  const p=gp(u,v);B.push({x:p.x,z:p.z,rot:gAngle(v)+rotJ,w,d,h,y,type,seed:R()*1000});
}
function pushBW(x,z,rot,w,d,h,type,y=0){B.push({x,z,rot,w,d,h,y,type,seed:R()*1000});}

const waterTowers=[],hvacs=[];

// ---------- district height model ----------
function district(u,v,r){
  // returns {h,type}
  let h=18,type=1;
  if(v<1500){ // FiDi
    const core=Math.exp(-Math.pow((v-800)/650,2));
    h=14+r*r*40+core*(r<0.32? 60+Math.pow(R(),1.6)*260 : r*70);
    type=h>110?0:(r<0.25?3:1);
  } else if(v<2900){ h=12+r*32+(r<0.05?40+R()*70:0); type=r<0.55?2:1; } // Tribeca/Chinatown/LES
  else if(v<4300){ h=12+r*26+(r<0.04?30+R()*60:0); type=r<0.4?2:(r<0.8?1:3); } // Village/SoHo
  else if(v<5300){ h=22+r*r*70+(Math.abs(u)<500&&r<0.12?60+R()*90:0); type=r<0.3?2:(r<0.75?1:3);} // Chelsea/Flatiron/Gramercy
  else if(v<6400){ // 30s: Midtown South + garment
    h=35+r*r*160+(r<0.10?80+R()*140:0); type=h>120?(R()<0.6?0:3):(r<0.6?1:3);
  } else if(v<7650){ // Midtown core, 57th supertall row
    h=45+r*r*200+(r<0.12?100+R()*160:0);
    if(v>7150&&Math.abs(u)<700&&r<0.045)h=330+R()*120;
    type=h>130?0:(r<0.5?1:3);
  } else if(v<11750){ // UES / UWS flank the park
    const facing=(Math.abs(u-360)<160||Math.abs(u+470)<160);
    h=facing?55+r*60:(18+r*44+(r<0.06?50+R()*60:0));
    type=r<0.3?2:(r<0.85?1:3); if(h>110)type=0;
  } else if(v<15350){ h=15+r*22+(r<0.05?40+R()*30:0); type=r<0.7?2:1; } // Harlem
  else if(v<19100){ h=20+r*32; type=r<0.55?2:1; } // Washington Heights
  else { h=16+r*22; type=r<0.5?2:1; } // Inwood
  // Hudson Yards / far west midtown glass
  if(u<-1100&&v>5150&&v<6050){h=60+r*r*260;type=0;}
  // West Side river-facing new glass
  if(u<-1350&&v>4300&&v<7600&&r>0.8){h=80+R()*110;type=0;}
  return{h:Math.max(9,h),type};
}
function blockTint(v){ // canvas block color per district
  if(v<1500)return'#7d7468';if(v<4300)return'#8a7a68';
  if(v<7650)return'#8b8177';if(v<11750)return'#8d7d6c';
  if(v<15350)return'#8a7260';return'#7f7261';
}

// ---------- generate the city ----------
const BLOCKS=[]; // {pts:[4 corners world], v, green}
function blockCorners(u0,u1,v0,v1){
  return[gp(u0,v0),gp(u1,v0),gp(u1,v1),gp(u0,v1)];
}
function fillLots(u0,u1,v0,v1){
  // perimeter lots on north & south long edges
  const bw=u1-u0, bd=v1-v0;
  const rowD=Math.min(26,bd*0.42);
  for(const side of[0,1]){
    const vc=side?v1-rowD/2:v0+rowD/2;
    let u=u0;
    while(u<u1-8){
      let lw=13+R()*22; if(u+lw>u1)lw=u1-u;
      const uc=u+lw/2;
      u+=lw+1.5;
      if(isExcluded(uc,vc)||greenAt(uc,vc))continue;
      if(distToBroadway(uc,vc)<26)continue;
      const g=geoAt(vc);const b=gridBasis(vc);
      if(Math.abs(uc)>g.hw-55)continue;
      const r=R();const d=district(uc,vc,r);
      let w=lw-1.5,dep=rowD-2,h=d.h;
      if(h>140){w=Math.min(46,bw*0.35);dep=Math.min(46,bd*0.8);} // towers claim bigger footprints
      pushB(uc,vc,w,dep,h,d.type);
      const bl=B[B.length-1];
      if(h>24&&h<115&&d.type!==0&&R()<0.62)waterTowers.push({b:bl,ox:(R()-0.5)*w*0.5,oz:(R()-0.5)*dep*0.5});
      if(h>=60&&R()<0.8)hvacs.push({b:bl,ox:(R()-0.5)*w*0.55,oz:(R()-0.5)*dep*0.55});
    }
  }
}
function genUptown(){
  const AV=[];for(let k=0;k<=12;k++)AV.push(-1560+k*260);
  for(let v0=4300;v0<21380;v0+=80){
    const vc=v0+40,g=geoAt(vc);
    for(let k=0;k<AV.length-1;k++){
      const u0=AV[k]+16,u1=AV[k+1]-16;
      const uc=(u0+u1)/2;
      if(Math.abs(uc)+40>g.hw)continue;
      if(Math.abs(u0)>g.hw-60&&Math.abs(u1)>g.hw-60)continue;
      const green=greenAt(uc,vc);
      BLOCKS.push({pts:blockCorners(Math.max(u0,-g.hw+45),Math.min(u1,g.hw-45),v0+9,v0+71),v:vc,green});
      if(green)continue;
      // Stuyvesant-style superblocks
      if(uc>900&&uc<1500&&vc>4300&&vc<4800){if(k%2===0&&(v0%320)===(4340%320-40+40)){}}
      fillLots(Math.max(u0,-g.hw+55),Math.min(u1,g.hw-55),v0+9,v0+71);
    }
  }
}
function genDowntown(){
  for(let v0=150;v0<4300;v0+=104){
    const vc=v0+52,g=geoAt(vc);
    const sp=150+hash2(v0,3)*70;
    const n=Math.ceil(2*g.hw/sp);
    for(let k=0;k<n;k++){
      let u0=-g.hw+55+k*sp+hash2(k,v0)*24,u1=u0+sp-26;
      const uc=(u0+u1)/2;
      if(Math.abs(uc)+40>g.hw)continue;
      const green=greenAt(uc,vc);
      BLOCKS.push({pts:blockCorners(u0,Math.min(u1,g.hw-45),v0+8,v0+96),v:vc,green});
      if(green)continue;
      fillLots(u0,Math.min(u1,g.hw-50),v0+8,v0+96);
    }
  }
}
function genSpecials(){
  // Stuy Town / Peter Cooper superblock towers on green
  for(let i=0;i<14;i++){
    const u=980+(i%5)*105+R()*30,v=4180+Math.floor(i/5)*160+R()*40;
    if(Math.abs(u)<hwAt(v)-80)pushB(u,v,26,26,42+R()*8,1);
  }
  GREENS.push([930,1520,4110,4640,0]);
  // Harlem / uptown project tower clusters
  for(let c=0;c<9;c++){
    const vc=12100+R()*3400,uc=(R()<0.55?1:-1)*(300+R()*600);
    if(Math.abs(uc)>hwAt(vc)-220)continue;
    GREENS.push([uc-170,uc+170,vc-170,vc+170,0]);
    for(let t=0;t<5;t++){const u=uc+(R()-0.5)*260,v=vc+(R()-0.5)*260;pushB(u,v,24,24,52+R()*26,1);}
  }
}

// ---------- named landmarks ----------
function genLandmarks(){
  const T=(u,v,w,d,h,type,y=0)=>pushB(u,v,w,d,h,type,y);
  // WTC site
  excl(-430,950,270);
  T(-330,780,58,58,285,0); T(-520,760,52,52,240,0); T(-330,1100,55,55,220,0); T(-500,1120,48,48,180,0);
  // Woolworth
  excl(140,1480,70); T(140,1450,62,38,95,3); T(140,1432,26,26,146,3,95);
  // Flatiron zone kept clear (bespoke wedge)
  excl(330,4715,60);
  // Empire State
  excl(200,5680,140);
  T(200,5680,124,60,82,3); T(200,5680,64,40,198,3,82); T(200,5680,33,27,92,3,280);
  // Grand Central + MetLife + One Vanderbilt + Chrysler
  excl(280,5680,120); T(280,5660,132,88,34,3);
  excl(300,5810,110); T(300,5810,150,44,212,1,34);
  excl(150,5810,90); T(150,5810,62,62,180,0); T(150,5810,46,46,140,0,180); T(150,5810,27,27,107,0,320);
  excl(640,5905,85); T(640,5905,56,56,238,0);
  // 57th street supertall row
  excl(390,7290,55); T(390,7290,28.5,28.5,426,3);
  excl(-50,7330,50);  T(-50,7330,18,58,435,0);
  excl(-260,7360,70); T(-260,7360,53,36,300,0); T(-260,7360,40,30,142,0,300);
  excl(-160,7290,50); T(-160,7290,42,28,306,0);
  excl(-350,7420,55); T(-350,7420,42,26,290,3);
  excl(110,7250,55);  T(110,7250,42,32,320,0);
  // Rockefeller Center
  excl(80,6650,110); T(80,6650,90,32,259,3); T(180,6600,60,28,120,3); T(-20,6600,60,28,120,3);
  // Times Sq towers
  T(-260,6480,52,44,220,0); T(-120,6560,48,40,247,0);
  // UN
  const uUN=hwAt(6350)-150; excl(uUN,6350,140);
  T(uUN,6350,34,150,154,0); T(uUN-60,6250,64,40,22,1);
  // Hudson Yards
  excl(-1330,5480,320);
  T(-1330,5420,62,52,387,0); T(-1240,5580,56,46,341,0); T(-1400,5560,52,46,273,0); T(-1300,5290,46,46,220,0); T(-1430,5390,44,40,180,0);
  // Javits
  excl(-1520,5890,160); T(-1520,5890,190,95,26,0);
  // MSG + Penn
  excl(-560,5570,110); // bespoke cylinder
  T(-680,5570,44,44,150,0); T(-440,5620,50,40,120,0);
  // Met Museum in the park
  pushB(300,9720,175,95,25,3);
  // Cathedral St John the Divine
  excl(-660,12050,110); T(-660,12050,58,175,52,1); T(-660,11970,30,30,70,1);
  // Columbia
  T(-780,12350,90,40,30,3); T(-880,12450,90,40,30,3);
  // George Washington Bridge bus stn etc handled procedurally
}

genLandmarks();
genDowntown();
genUptown();
genSpecials();

// ---------- outer boroughs ----------
const BORO=[]; // separate list (also instanced, type 4)
function riverW(v){return v>13000?260:(v<500?520:600);}
function genBoros(){
  // east: Brooklyn / Queens / Bronx
  for(let i=0;i<52000;i++){
    const v=-2200+R()*24200;
    const g=geoAt(clamp(v,0,21600));
    let x0;
    if(v<-200)x0=1500-(v+200)*0.55; else x0=g.cx+g.hw+riverW(v);
    const x=x0+50+Math.pow(R(),1.5)*3300;
    let h=7+R()*18,type=4;
    if(Math.abs(v-6900)<450&&x<x0+900){h=30+Math.pow(R(),2)*150;type=R()<0.5?0:4;} // LIC
    if(Math.abs(v-3400)<380&&x<x0+800&&R()<0.4)h=30+R()*110; // Williamsburg
    if(v<1400&&v>200&&x>x0+900&&x<x0+2600&&R()<0.3)h=50+R()*140; // Dtn Bklyn
    if(v>15200&&R()<0.12)h=30+R()*45; // Bronx towers
    BORO.push({x,z:-v,rot:R()*0.4-0.2+(v>4000?gAngle(clamp(v,0,21600)):0),w:14+R()*26,d:14+R()*26,h,type:h>60?0:4,seed:R()*1000});
  }
  // west: New Jersey
  for(let i=0;i<18000;i++){
    const v=-1500+R()*21000;
    const g=geoAt(clamp(v,0,21600));
    const x0=g.cx-g.hw-1250;
    const x=x0-50-Math.pow(R(),1.6)*2500;
    let h=6+R()*14;
    if(v<1500&&v>-600&&x>x0-1500&&R()<0.4)h=50+Math.pow(R(),1.5)*220; // Jersey City
    if(Math.abs(v-5600)<700&&x>x0-900&&R()<0.2)h=40+R()*120; // Hoboken/Newport
    BORO.push({x,z:-v,rot:R()*0.5-0.25,w:14+R()*24,d:14+R()*24,h,type:h>60?0:4,seed:R()*1000});
  }
  for(let i=0;i<7000;i++){
    const v=500+R()*3300;const g=geoAt(v);
    const x0=g.cx+g.hw+riverW(v);
    const x=x0+40+Math.pow(R(),1.7)*1600;
    BORO.push({x,z:-v,rot:R()*0.4-0.2,w:13+R()*22,d:13+R()*22,h:8+R()*20+(R()<0.05?40+R()*60:0),type:4,seed:R()*1000});
  }
  // Roosevelt Island sliver
  for(let v=6350;v<9100;v+=120){
    const g=geoAt(v);const x=g.cx+g.hw+riverW(v)/2+40;
    if(R()<0.7)BORO.push({x,z:-v,rot:gAngle(v),w:20,d:44,h:25+R()*40,type:4,seed:R()*1000});
  }
}
genBoros();

// ---------- THREE setup ----------

// ---------- shared uniforms ----------
const U={
  uTime:{value:0},
  uSunDir:{value:new THREE.Vector3(-0.82,0.20,0.36).normalize()},
  uSunCol:{value:new THREE.Color(2.9,1.62,0.82)},
  uHemiSky:{value:new THREE.Color(0.45,0.5,0.72)},
  uHemiGnd:{value:new THREE.Color(0.30,0.24,0.18)},
  uLit:{value:0.06},
  uLitCol:{value:new THREE.Color(2.3,1.45,0.62)},
  uCloud:{value:0.8},
  uDetail:{value:1.0},
};
const fogU=THREE.UniformsLib.fog;

const CLOUD_GLSL=`
float cshadow(vec2 xz,float t){
  vec2 q=xz*0.00016+vec2(t*0.006,t*0.0022);
  float n=sin(q.x*2.1+sin(q.y*1.7))*sin(q.y*1.6-sin(q.x*1.3+1.7));
  n+=0.6*sin(q.x*4.7+1.1)*sin(q.y*3.9+t*0.02);
  return clamp(1.0-uCloud*0.28*smoothstep(0.15,1.2,n),0.55,1.0);
}
float hash13(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453);}
`;

// ---------- building shader ----------
const buildingMat=new THREE.ShaderMaterial({
  uniforms:Object.assign({},THREE.UniformsUtils.clone(fogU),U),
  fog:true,
  vertexShader:`
    attribute float aSeed; attribute float aType;
    varying vec3 vLocal; varying vec3 vNor; varying vec3 vWorld; varying vec3 vDims;
    varying float vSeed; varying float vType;
    #include <common>
    #include <fog_pars_vertex>
    void main(){
      mat4 im=instanceMatrix;
      vDims=vec3(length(im[0].xyz),length(im[1].xyz),length(im[2].xyz));
      vLocal=position; vSeed=aSeed; vType=aType;
      vNor=normalize(mat3(im)*normal);
      vec4 wp=im*vec4(position,1.0);
      vWorld=wp.xyz;
      vec4 mvPosition=viewMatrix*wp;
      gl_Position=projectionMatrix*mvPosition;
      #include <fog_vertex>
    }`,
  fragmentShader:`
    uniform float uTime; uniform vec3 uSunDir; uniform vec3 uSunCol;
    uniform vec3 uHemiSky; uniform vec3 uHemiGnd; uniform float uLit; uniform vec3 uLitCol;
    uniform float uCloud; uniform float uDetail;
    varying vec3 vLocal; varying vec3 vNor; varying vec3 vWorld; varying vec3 vDims;
    varying float vSeed; varying float vType;
    #include <common>
    #include <fog_pars_fragment>
    ${CLOUD_GLSL}
    void main(){
      vec3 n=normalize(vNor);
      float type=vType;
      vec3 m=vec3(vLocal.x*vDims.x,vLocal.y*vDims.y,vLocal.z*vDims.z);
      float H=vDims.y;
      bool roof=n.y>0.5;
      float ir=hash13(vec3(vSeed,1.7,3.1));
      // base facade albedo by type
      vec3 alb;
      float glass=0.0;
      if(type<0.5){alb=mix(vec3(0.18,0.22,0.27),vec3(0.32,0.36,0.40),ir);glass=1.0;}
      else if(type<1.5){alb=mix(vec3(0.40,0.31,0.23),vec3(0.52,0.43,0.33),ir);}
      else if(type<2.5){alb=mix(vec3(0.46,0.24,0.17),vec3(0.60,0.36,0.26),ir);}
      else if(type<3.5){alb=mix(vec3(0.60,0.53,0.42),vec3(0.74,0.68,0.57),ir);}
      else {alb=mix(vec3(0.46,0.41,0.36),vec3(0.60,0.55,0.50),ir);}
      // window grid
      float floorH=mix(3.4,3.7,glass); if(type>1.5&&type<2.5)floorH=3.1;
      float winW=glass>0.5?2.6:2.9;
      float hcoord=abs(n.x)>0.5?m.z:m.x;
      float col=floor(hcoord/winW);
      float fl=floor(m.y/floorH);
      vec2 cell=vec2(fract(hcoord/winW),fract(m.y/floorH));
      float wr=hash13(vec3(col,fl,vSeed));
      // detail fade with distance
      float fw=fwidth(hcoord/winW)+fwidth(m.y/floorH);
      float detail=(1.0-smoothstep(0.8,2.6,fw))*uDetail;
      // window mask
      float wx=glass>0.5?0.86:(0.42+0.1*ir);
      float wy=glass>0.5?0.80:0.52;
      float win=step(abs(cell.x-0.5),wx*0.5)*step(abs(cell.y-0.55),wy*0.5);
      if(roof)win=0.0;
      win*=detail;
      // lighting
      float ndl=max(dot(n,uSunDir),0.0);
      float cs=cshadow(vWorld.xz,uTime);
      vec3 ambient=mix(uHemiGnd,uHemiSky,n.y*0.5+0.5);
      vec3 V=normalize(cameraPosition-vWorld);
      // facade color
      vec3 colr=alb;
      if(!roof){
        // masonry piers/spandrels vs glass
        vec3 winCol;
        vec3 nj=normalize(n+vec3(wr-0.5,hash13(vec3(fl,col,vSeed+9.0))-0.5,wr*0.7-0.35)*(glass>0.5?0.10:0.22));
        vec3 Rf=reflect(-V,nj);
        float sunspec=pow(max(dot(Rf,uSunDir),0.0),260.0)*(0.35+0.95*wr);
        vec3 skyRef=mix(uHemiGnd*0.6,uHemiSky*1.25,Rf.y*0.5+0.5);
        winCol=skyRef*(glass>0.5?0.36:0.13)+uSunCol*sunspec*(glass>0.5?2.6:1.0);
        // interior lights (dusk showpiece): windows ignite one by one
        float th=wr*0.92+0.04*hash13(vec3(vSeed,fl,2.2));
        float lit=step(th,uLit);
        float warmth=0.8+0.8*hash13(vec3(col,vSeed,fl+4.0));
        winCol=mix(winCol,uLitCol*warmth,lit*0.92);
        colr=mix(alb,winCol,win);
        // far aggregate: keep towers glowing at dusk when windows unresolvable
        colr+=uLitCol*uLit*(1.0-detail)*(glass>0.5?0.34:0.22)*(0.5+0.9*hash13(vec3(vSeed,floor(m.y/8.0),5.0)));
        // cornice + parapet band
        if(type>0.5&&m.y>H-2.4&&H>12.0)colr=alb*1.35;
        // fire-escape hint on tenements
        if(type>1.5&&type<2.5){
          float fe=step(fract(hcoord/11.0),0.16)*step(4.0,m.y)*step(m.y,H-3.0);
          colr*=1.0-0.28*fe*detail;
        }
        // street level: storefronts + awnings
        if(m.y<4.6&&H>8.0){
          float aw=hash13(vec3(col*0.5,vSeed,7.0));
          vec3 awc=aw<0.33?vec3(0.45,0.12,0.10):(aw<0.6?vec3(0.10,0.22,0.14):vec3(0.16,0.16,0.2));
          colr=mix(vec3(0.09,0.08,0.08)+uLitCol*uLit*0.5*wr,awc,step(3.2,m.y)*detail*step(type,3.5));
        }
      } else {
        colr=alb*(0.26+0.20*hash13(vec3(floor(m.x/6.0),floor(m.z/6.0),vSeed)));
        float px=vDims.x*0.5-1.6,pz=vDims.z*0.5-1.6;
        if(abs(m.x)>px||abs(m.z)>pz)colr=alb*0.72; // parapet
      }
      vec3 lightv=uSunCol*(ndl*cs)*1.25+ambient*0.7;
      vec3 outc=colr*lightv;
      // glass facades pick up direct sun mirror even outside window mask
      if(glass>0.5&&!roof){
        vec3 Rf2=reflect(-V,n);
        outc+=uSunCol*pow(max(dot(Rf2,uSunDir),0.0),900.0)*2.0;
      }
      gl_FragColor=vec4(outc,1.0);
      #include <fog_fragment>
      #include <tonemapping_fragment>
      #include <colorspace_fragment>
    }`
});

function buildInstanced(list){
  const geo=new THREE.BoxGeometry(1,1,1);geo.translate(0,0.5,0);
  const n=list.length;
  const mesh=new THREE.InstancedMesh(geo,buildingMat,n);
  mesh.frustumCulled=false;
  const seeds=new Float32Array(n),types=new Float32Array(n);
  const M=new THREE.Matrix4(),q=new THREE.Quaternion(),p=new THREE.Vector3(),s=new THREE.Vector3(),e=new THREE.Euler();
  for(let i=0;i<n;i++){
    const b=list[i];
    e.set(0,b.rot,0);q.setFromEuler(e);
    p.set(b.x,(b.y||0)+1.4,b.z);s.set(b.w,b.h,b.d);
    M.compose(p,q,s);mesh.setMatrixAt(i,M);
    seeds[i]=b.seed;types[i]=b.type;
  }
  geo.setAttribute('aSeed',new THREE.InstancedBufferAttribute(seeds,1));
  geo.setAttribute('aType',new THREE.InstancedBufferAttribute(types,1));
  return mesh;
}

/* ---------- island ground: shape + baked aerial map ---------- */
const X0=-2800,X1=4800,V0=-500,V1=21900;
const MAPW=2048,MAPH=8192;
const mapCanvas=document.createElement('canvas');mapCanvas.width=MAPW;mapCanvas.height=MAPH;
const mtx=mapCanvas.getContext('2d');
const mapTex=new THREE.CanvasTexture(mapCanvas);
mapTex.colorSpace=THREE.SRGBColorSpace;mapTex.anisotropy=8;
mapTex.minFilter=THREE.LinearMipmapLinearFilter;

function coastPts(){
  const west=[],east=[];
  for(let v=0;v<=21600;v+=90){
    const g=geoAt(v);
    const wig=Math.sin(v*0.013)*22+Math.sin(v*0.0031+2.0)*35;
    west.push([g.cx-g.hw+wig*0.6,v]);east.push([g.cx+g.hw+wig*0.5,v]);
  }
  return{west,east};
}
const COAST=coastPts();
function islandShape(){
  const s=new THREE.Shape();
  const{west,east}=COAST;
  s.moveTo(west[0][0],west[0][1]);
  for(const p of west)s.lineTo(p[0],p[1]);
  for(let i=east.length-1;i>=0;i--)s.lineTo(east[i][0],east[i][1]);
  s.closePath();return s;
}
function setTransform(){
  mtx.setTransform(MAPW/(X1-X0),0,0,-MAPH/(V1-V0),-X0*MAPW/(X1-X0),MAPH*(1+V0/(V1-V0)));
}
function islandPath2D(){
  const p=new Path2D();const{west,east}=COAST;
  p.moveTo(west[0][0],west[0][1]);
  for(const q of west)p.lineTo(q[0],q[1]);
  for(let i=east.length-1;i>=0;i--)p.lineTo(east[i][0],east[i][1]);
  p.closePath();return p;
}
const ISLAND_PATH=islandPath2D();

function bakeMap(shadowLen,shadowAlpha,duskGlow){
  mtx.setTransform(1,0,0,1,0,0);
  mtx.clearRect(0,0,MAPW,MAPH);
  setTransform();
  mtx.save();mtx.clip(ISLAND_PATH);
  // asphalt base (streets)
  mtx.fillStyle='#4e483f';mtx.fillRect(X0,V0,X1-X0,V1-V0);
  // blocks
  for(const bl of BLOCKS){
    mtx.fillStyle=bl.green?'#48642a':blockTint(bl.v);
    if(!bl.green&&hash2(bl.v,bl.pts[0].x)<0.2)mtx.fillStyle='#847867';
    mtx.beginPath();
    mtx.moveTo(bl.pts[0].x,-bl.pts[0].z);
    for(let i=1;i<4;i++)mtx.lineTo(bl.pts[i].x,-bl.pts[i].z);
    mtx.closePath();mtx.fill();
  }
  // green zones
  for(const g of GREENS){
    const kind=g[4];
    mtx.fillStyle=kind===1?'#31481e':(kind===2?'#546541':'#466228');
    const c=[gp(g[0],g[2]),gp(g[1],g[2]),gp(g[1],g[3]),gp(g[0],g[3])];
    mtx.beginPath();mtx.moveTo(c[0].x,-c[0].z);
    for(let i=1;i<4;i++)mtx.lineTo(c[i].x,-c[i].z);
    mtx.closePath();mtx.fill();
  }
  // Central Park interior
  const pk=(u,v)=>{const p=gp(u,v);return[p.x,-p.z];};
  function ellip(u,v,ru,rv,fill){
    mtx.fillStyle=fill;mtx.beginPath();
    for(let a=0;a<=32;a++){const t=a/32*Math.PI*2;const q=pk(u+Math.cos(t)*ru,v+Math.sin(t)*rv);a?mtx.lineTo(q[0],q[1]):mtx.moveTo(q[0],q[1]);}
    mtx.closePath();mtx.fill();
  }
  // tree masses (darker blobs)
  for(let i=0;i<160;i++){
    const u=lerp(PARK.u0+40,PARK.u1-40,hash2(i,1.2)),v=lerp(PARK.v0+60,PARK.v1-60,hash2(i,3.7));
    ellip(u,v,30+hash2(i,5)*70,30+hash2(i,7)*70,'rgba(38,58,22,0.55)');
  }
  ellip(-220,8250,150,180,'#5a7a35');       // Sheep Meadow
  ellip(-40,9950,190,260,'#5f8038');        // Great Lawn
  ellip(0,10950,190,220,'#57742f');         // North Meadow
  for(let i=0;i<5;i++)ellip(-90+i*55,10950+((i%2)*120-60),34,34,'#a68d55'); // ballfields
  ellip(-180,8680,190,140,'#2e4d63');       // the Lake
  ellip(240,7720,95,75,'#2e4d63');          // the Pond
  ellip(220,11520,140,110,'#2e4d63');       // Harlem Meer
  ellip(-50,10430,340,470,'#31566e');       // Reservoir
  // park drives
  mtx.strokeStyle='rgba(200,185,150,0.5)';mtx.lineWidth=9;
  mtx.beginPath();
  for(let a=0;a<=64;a++){const t=a/64*Math.PI*2;
    const q=pk(-50+Math.cos(t)*330,9650+Math.sin(t)*1870);
    a?mtx.lineTo(q[0],q[1]):mtx.moveTo(q[0],q[1]);}
  mtx.closePath();mtx.stroke();
  // Broadway slash
  mtx.strokeStyle='#6b645a';mtx.lineWidth=30;mtx.lineJoin='round';
  mtx.beginPath();
  for(let i=0;i<BWY.length;i++){const p=gp(BWY[i][0],BWY[i][1]);i?mtx.lineTo(p.x,-p.z):mtx.moveTo(p.x,-p.z);}
  mtx.stroke();
  // dusk street glow baked subtly
  if(duskGlow>0){
    mtx.strokeStyle=`rgba(255,170,80,${0.10*duskGlow})`;mtx.lineWidth=26;
    mtx.beginPath();
    for(let k=0;k<=12;k++){const u=-1560+k*260;
      let started=false;
      for(let v=400;v<21400;v+=400){
        if(Math.abs(u)>hwAt(v)-70){started=false;continue;}
        const p=gp(u,v);
        if(!started){mtx.moveTo(p.x,-p.z);started=true;}else mtx.lineTo(p.x,-p.z);
      }}
    mtx.stroke();
  }
  // building shadows, bucketed by width for batched strokes
  if(shadowLen>0.05){
    const s=U.uSunDir.value;
    const hlen=Math.hypot(s.x,s.z);
    const dx=-s.x/hlen,dz=-s.z/hlen; // world shadow dir
    const buckets=new Map();
    for(const b of B){
      if(b.h<12)continue;
      const L=Math.min(b.h*shadowLen,900);
      const w=Math.max(b.w,b.d);
      const key=Math.min(7,Math.round(w/9));
      let arr=buckets.get(key);if(!arr){arr=[];buckets.set(key,arr);}
      arr.push([b.x,-b.z,b.x+dx*L,-(b.z+dz*L)]);
    }
    mtx.strokeStyle=`rgba(20,14,20,${shadowAlpha})`;mtx.lineCap='butt';
    for(const[key,arr]of buckets){
      mtx.lineWidth=Math.max(6,key*9);
      mtx.beginPath();
      for(const q of arr){mtx.moveTo(q[0],q[1]);mtx.lineTo(q[2],q[3]);}
      mtx.stroke();
    }
  }
  mtx.restore();
  mapTex.needsUpdate=true;
}

const groundMat=new THREE.ShaderMaterial({

    #include <common>

    }`
});

  const geo=new THREE.ExtrudeGeometry(s,{depth:2.4,bevelEnabled:false,curveSegments:2});

    const v3=(cur,tgt)=>cur.lerpVectors(F===lightState.from?cur.copy(cur):cur,cur,0); // unused
    U.uSunDir.value.copy(F.sun).lerp(new THREE.Vector3(...T.sun),k).normalize();
    U.uSunCol.value.copy(F.sunCol).lerp(new THREE.Color(...T.sunCol),k);
    U.uHemiSky.value.copy(F.hemiSky).lerp(new THREE.Color(...T.hemiSky),k);
    U.uHemiGnd.value.copy(F.hemiGnd).lerp(new THREE.Color(...T.hemiGnd),k);
    scene.fog.color.copy(F.fog).lerp(new THREE.Color(...T.fog),k);
    scene.fog.density=lerp(F.fogD,T.fogD,k);
    skyMat.uniforms.uZen.value.copy(F.zen).lerp(new THREE.Color(...T.zen),k);
    skyMat.uniforms.uHor.value.copy(F.hor).lerp(new THREE.Color(...T.hor),k);
    skyMat.uniforms.uGlow.value.copy(F.glow).lerp(new THREE.Color(...T.glow),k);
    waterMat.uniforms.uDeep.value.copy(F.deep).lerp(new THREE.Color(...T.deep),k);
    sunLight.color.copy(F.dirCol).lerp(new THREE.Color(T.dirCol),k);
    sunLight.intensity=lerp(F.dirI,T.dirI,k);
    hemi.intensity=lerp(F.hemiI,T.hemiI,k);
    hemi.color.copy(U.uHemiSky.value);hemi.groundColor.copy(U.uHemiGnd.value);
    renderer.toneMappingExposure=lerp(F.expo,T.expo,k);
    sunLight.position.copy(U.uSunDir.value).multiplyScalar(10000);
  }
  // windows ignite one by one over ~25s toward the target
  const rate=lightState.litTarget>lightState.lit?dt/25:dt/6;
  lightState.lit=lightState.lit<lightState.litTarget?
    Math.min(lightState.litTarget,lightState.lit+rate):
    Math.max(lightState.litTarget,lightState.lit-rate);
  U.uLit.value=lightState.lit;
  const dz=clamp(lightState.lit*1.6,0,1);
  lampPts.material.opacity=dz*0.85;
  for(const bm of boroMats)bm.emissiveIntensity=dz*0.10;
  neckPts.material.opacity=dz;
}

/* ---------- camera presets ---------- */
function P3(u,v,y){const p=gp(u,v);return new THREE.Vector3(p.x,y,p.z);}
const CAMS={
  hero:{p:new THREE.Vector3(-7200,4900,5300),t:new THREE.Vector3(1500,0,-9600)},
  downtown:{p:new THREE.Vector3(-2050,620,3050),t:new THREE.Vector3(-50,240,-700)},
  midtown:{p:P3(85,4250,120),t:P3(120,6600,150)},
  park:{p:P3(-1750,7050,2300),t:P3(-40,9900,0)},
  bridges:{p:new THREE.Vector3(2500,300,-1150),t:new THREE.Vector3(650,90,-2650)},
  gw:{p:P3(150,20500,1500),t:P3(300,15600,0)}
};
const camTween={t:1,fromP:null,fromT:null,toP:null,toT:null};
function flyTo(name){
  const c=CAMS[name];
  camTween.t=0;
  camTween.fromP=camera.position.clone();camTween.fromT=controls.target.clone();
  camTween.toP=c.p.clone();camTween.toT=c.t.clone();
}
function tickCam(dt){
  if(camTween.t<1){
    camTween.t=Math.min(1,camTween.t+dt/3.2);
    const k=smooth(smooth(camTween.t));
    camera.position.lerpVectors(camTween.fromP,camTween.toP,k);
    controls.target.lerpVectors(camTween.fromT,camTween.toT,k);
  }
}

/* ---------- UI ---------- */
const ui=document.getElementById('ui'),hint=document.getElementById('hint');
const st={traffic:0.7,boats:0.8,q:2,photo:false};
function selectBtn(group,btn){document.querySelectorAll(`[data-${group}]`).forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
document.querySelectorAll('[data-cam]').forEach(b=>b.onclick=()=>{selectBtn('cam',b);flyTo(b.dataset.cam);});
document.querySelectorAll('[data-light]').forEach(b=>b.onclick=()=>{selectBtn('light',b);applyPreset(b.dataset.light);});
document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{selectBtn('q',b);setQuality(+b.dataset.q);});
document.getElementById('trafic').oninput=e=>{st.traffic=e.target.value/100;};
document.getElementById('boats').oninput=e=>{st.boats=e.target.value/100;};
document.getElementById('photo').onclick=()=>togglePhoto();
function togglePhoto(){st.photo=!st.photo;ui.classList.toggle('hidden',st.photo);hint.classList.toggle('hidden',st.photo);}
function setQuality(q){
  st.q=q;
  maxDPR=q===2?2:(q===1?1.5:1);
  U.uDetail.value=q===0?0.7:1;
  waterMat.uniforms.uQual.value=q>0?1:0;
  applySize();
}
addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R'){flyTo('hero');selectBtn('cam',document.querySelector('[data-cam=hero]'));}
  if(e.key==='p'||e.key==='P')togglePhoto();
});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();applySize();});

/* ---------- boot ---------- */
applySize();
sunLight.position.copy(U.uSunDir.value).multiplyScalar(10000);
hemi.color.copy(U.uHemiSky.value);hemi.groundColor.copy(U.uHemiGnd.value);
bakeMap(PRESETS.gold.shLen,PRESETS.gold.shA,0);
lightState.from=snapshotLight();lightState.to=PRESETS.gold;lightState.t=1;

const clock=new THREE.Clock();
const camTarget=new THREE.Vector3();
function frame(){
  requestAnimationFrame(frame);
  const dt=Math.min(clock.getDelta(),0.1);
  const t=clock.elapsedTime;
  U.uTime.value=t;
  tickLight(dt);tickCam(dt);
  controls.update();
  // clamp target to the greater island area
  controls.target.x=clamp(controls.target.x,-9000,11000);
  controls.target.z=clamp(controls.target.z,-24000,7000);
  controls.target.y=clamp(controls.target.y,0,2500);
  traffic.mesh.material.uniforms.uDensity.value=st.traffic*(st.q===0?0.55:1);
  updateBoats(dt,st.boats);
  // helicopters trace the shoreline
  for(const h of helis){
    const s=(t*0.011+h.ph)%1;
    const v=1500+Math.abs(Math.sin(s*Math.PI*2))*14500;
    const g=geoAt(v);
    const west=h.ph<0.4;
    h.g.position.set(west?g.cx-g.hw-260:g.cx+g.hw+320,270+Math.sin(t*0.3+h.ph*9.0)*30,-v);
    h.g.rotation.y=Math.cos(s*Math.PI*2)>0?-Math.PI/2:Math.PI/2;
    h.rotor.rotation.z=t*30;
    h.blink.material.color.setHex((t*2%1)<0.12?0xff4444:0x551111);
  }
  // jet on approach
  jet.t=(t*0.008)%1;
  jet.g.position.lerpVectors(jet.A,jet.B,jet.t);
  jet.g.rotation.y=Math.atan2(-(jet.B.z-jet.A.z),jet.B.x-jet.A.x);
  // birds over the park
  {
    const pos=birds.pts.geometry.attributes.position.array;
    const c=gp(-60,9600);
    for(let i=0;i<birds.arr.length;i++){
      const b=birds.arr[i];b.a+=b.sp*dt*3;
      pos[i*3]=c.x+Math.cos(b.a)*b.r;
      pos[i*3+1]=b.y+Math.sin(t*2+b.w)*6;
      pos[i*3+2]=c.z+Math.sin(b.a)*b.r*0.8;
    }
    birds.pts.geometry.attributes.position.needsUpdate=true;
  }
  // steam near the camera only
  for(const s of steams){
    const d=Math.hypot(camera.position.x-s.x,camera.position.z-s.z);
    const near=clamp((1600-d)/1200,0,1);
    const cyc=(t*0.35+s.ph)%1;
    s.sp.material.opacity=near*0.35*(1-cyc)*(st.q>0?1:0);
    s.sp.position.y=6+cyc*26;
    s.sp.scale.setScalar(8+cyc*30);
  }
  renderer.render(scene,camera);
}
frame();

</script>

    border: 1px solid rgba(255,255,255,.25); background: rgba(10,12,16,.55);
    color: rgba(255,255,255,.85); font: 13px/28px sans-serif; text-align: center;
    cursor: pointer; user-select: none; -webkit-user-select: none;

</style>
<script>
(function () {
  document.body.classList.add('hud-off');

  b.id = 'hudToggle';
  b.title = 'Show / hide controls';
  b.textContent = '▴';
  b.addEventListener('pointerdown', function (e) { e.stopPropagation(); });
  b.addEventListener('click', function (e) {
    e.stopPropagation();
    document.body.classList.toggle('hud-off');
  });
  document.body.appendChild(b);
})();
</script>
