<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MANHATTAN — one island, alive</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#1a1410;font-family:ui-sans-serif,-apple-system,'Segoe UI',Roboto,sans-serif}
  #c{display:block;width:100%;height:100%}
  #ui{position:fixed;top:14px;left:14px;z-index:10;display:flex;flex-direction:column;gap:8px;user-select:none;
      transition:opacity .4s}
  .panel{background:rgba(12,14,20,.62);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.09);
      border-radius:10px;padding:8px 10px;color:#e8e2d6;font-size:11px;box-shadow:0 4px 24px rgba(0,0,0,.35)}
  .row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
  .lbl{opacity:.55;font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;margin:2px 0 4px}
  button{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#e8e2d6;border-radius:6px;
      padding:4px 8px;font-size:10.5px;cursor:pointer;transition:background .15s}
  button:hover{background:rgba(255,190,110,.25)}
  button.on{background:rgba(255,170,70,.45);border-color:rgba(255,190,110,.6)}
  input[type=range]{width:86px;accent-color:#ffab4d;height:12px}
  select{background:rgba(20,22,30,.8);color:#e8e2d6;border:1px solid rgba(255,255,255,.14);border-radius:6px;font-size:10.5px;padding:3px}
  #hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(255,240,220,.5);font-size:11px;
      letter-spacing:.06em;z-index:9;pointer-events:none;transition:opacity 1s}
  .photo #ui,.photo #hint{opacity:0;pointer-events:none}
  #bars{position:fixed;left:0;right:0;height:0;background:#000;z-index:8;transition:height .8s cubic-bezier(.6,0,.3,1)}
  #barT{top:0}#barB{bottom:0}
  .photo #barT,.photo #barB{height:7vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="panel">
    <div class="lbl">Views</div>
    <div class="row">
      <button data-v="0" class="on">Island</button><button data-v="1">Downtown</button><button data-v="2">Canyon</button>
      <button data-v="3">Park</button><button data-v="4">Bridges</button><button data-v="5">GWB</button>
    </div>
  </div>
  <div class="panel">
    <div class="lbl">Light</div>
    <div class="row">
      <button data-l="0" class="on">Golden hour</button><button data-l="1">Noon</button><button data-l="2">Dusk</button>
    </div>
  </div>
  <div class="panel">
    <div class="row"><span style="width:52px;opacity:.7">Streets</span><input id="trafD" type="range" min="0" max="100" value="70"></div>
    <div class="row"><span style="width:52px;opacity:.7">Rivers</span><input id="boatD" type="range" min="0" max="100" value="70"></div>
    <div class="row" style="margin-top:5px">
      <select id="qual"><option value="2">High</option><option value="1" selected>Balanced</option><option value="0">Light</option></select>
      <button id="photo">Photo</button><button id="reset">Reset ⌂</button>
    </div>
  </div>
</div>
<div id="hint">drag to orbit · scroll to dive from island to street · right-drag to pan</div>
<div id="barT" style="position:fixed;top:0;left:0;right:0;height:0;background:#000;z-index:8;transition:height .8s cubic-bezier(.6,0,.3,1)"></div>
<div id="barB" style="position:fixed;bottom:0;left:0;right:0;height:0;background:#000;z-index:8;transition:height .8s cubic-bezier(.6,0,.3,1)"></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as BGU from 'three/addons/utils/BufferGeometryUtils.js';

/* ============================================================
   MANHATTAN — the whole island, procedural, golden hour.
   Coordinates: meters. +x = east, -z = north.
   s = meters north of the Battery. z = Z0 - s.
   ============================================================ */
const Z0 = 10900;                 // Battery southern tip z
const ISLAND_LEN = 21800;
const zOfS = s => Z0 - s;
const sOfZ = z => Z0 - z;

// --- deterministic RNG ------------------------------------------------
let _seed = 71;
function rnd(){ _seed = (_seed * 1664525 + 1013904223) >>> 0; return _seed / 4294967296; }
function rr(a,b){ return a + (b-a)*rnd(); }
function hash2(x,y){ let h = (x*374761393 + y*668265263) ^ 0x9e3779b9; h = (h ^ (h>>>13)) * 1274126177; return ((h ^ (h>>>16))>>>0)/4294967296; }

// --- island outline: [s, westX, eastX] --------------------------------
const OUTLINE = [
[0,-60,60],[150,-330,300],[400,-560,470],[800,-700,580],[1300,-800,650],
[2000,-830,700],[2600,-880,780],[3300,-950,900],[4000,-1060,1060],[4600,-1150,1250],
[5200,-1230,1420],[6000,-1360,1510],[6800,-1450,1500],[7600,-1620,1470],[8400,-1820,1420],
[9200,-2020,1400],[10000,-2160,1400],[10800,-2240,1400],[11600,-2290,1370],[12400,-2300,1320],
[13200,-2290,1270],[14000,-2250,1190],[14800,-2210,1060],[15600,-2180,940],[16400,-2150,780],
[17100,-2120,560],[17800,-2110,240],[18500,-2140,-120],[19200,-2190,-480],[19900,-2240,-760],
[20600,-2230,-980],[21200,-2120,-1180],[21600,-1930,-1370],[21800,-1720,-1540]];

function edgeAt(s){ // returns {w,e}
  if (s<=0) return {w:OUTLINE[0][1], e:OUTLINE[0][2]};
  for (let i=1;i<OUTLINE.length;i++){
    if (s <= OUTLINE[i][0]){
      const a=OUTLINE[i-1], b=OUTLINE[i], t=(s-a[0])/(b[0]-a[0]);
      return { w: a[1]+(b[1]-a[1])*t, e: a[2]+(b[2]-a[2])*t };
    }
  }
  const l=OUTLINE[OUTLINE.length-1]; return {w:l[1], e:l[2]};
}
function insideIsland(x,s,margin=0){
  if (s< -20 || s>ISLAND_LEN) return false;
  const {w,e}=edgeAt(s); return x> w+margin && x< e-margin;
}

// --- street grid ------------------------------------------------------
// numbered street n -> s. Houston ≈ s 4750, 80 m per block.
const stS = n => 4750 + n*80;
const WIDE = new Set([14,23,34,42,50,57,72,79,86,96,106,110,116,125,135,145,155,168,181,207]);
// Avenues: x position + s-extent  [x, s0, s1, width]
const AVENUES = [
 [1385, 4980, 6480, 15],            // Ave B
 [1245, 4900, 6560, 15],            // Ave A
 [1150, 4780, 17420, 20],           // 1st
 [ 870, 4700, 17800, 20],           // 2nd
 [ 590, 4620, 18300, 20],           // 3rd
 [ 380, 5850, 17050, 17],           // Lexington
 [ 180, 4650, 17550, 26],           // Park / 4th
 [ -20, 6520, 18280, 17],           // Madison
 [-220, 4820, 18750, 22],           // 5th
 [-500, 4750, 9470, 22],            // 6th (ends at the Park)
 [-500, 13550, 17850, 20],          // Lenox / Malcolm X
 [-780, 4900, 9470, 22],            // 7th
 [-780, 13550, 18400, 20],          // Adam Clayton Powell
 [-1060, 5100, 18850, 22],          // 8th / CPW / Frederick Douglass
 [-1340, 5150, 14750, 20],          // 9th / Columbus
 [-1620, 5150, 19850, 20],          // 10th / Amsterdam
 [-1900, 5200, 14100, 20],          // 11th / West End
 [-2140, 5500, 13600, 18],          // 12th
];
// Central Park bounds
const PARK = { x0:-1060, x1:-220, s0:9470, s1:13550 };
// Broadway polyline [s,x] — the diagonal
const BROADWAY = [
 [250,-50],[1500,-90],[2600,-70],[3600,-30],[4750,20],[5650,60],       // lower
 [6630,-220],[7470,-500],[8110,-780],[8900,-1010],[9470,-1060],        // the squares
 [10400,-1230],[11600,-1370],[13550,-1550],[14750,-1620],[16350,-1750],
 [17600,-1870],[19100,-2020],[20600,-1900],[21400,-1700]];
// St Nicholas Ave diagonal (uptown)
const STNICK = [[13550,-680],[14750,-880],[15950,-1100],[17150,-1350],[18150,-1560]];
function polyXAt(poly, s){
  if (s<=poly[0][0]) return poly[0][1];
  for (let i=1;i<poly.length;i++) if (s<=poly[i][0]){
    const a=poly[i-1],b=poly[i]; return a[1]+(b[1]-a[1])*(s-a[0])/(b[0]-a[0]);
  }
  return poly[poly.length-1][1];
}

// --- district height field -------------------------------------------
function gauss(v){ return Math.exp(-v*v); }
function baseHeight(s, x, onAve){
  let h = 26;
  if (s<2400) h = 42;                                     // FiDi base
  else if (s<4750) h = 22;                                // Tribeca/SoHo/LES
  else if (s<6500) h = 20;                                // Village
  else if (s<9600) h = 34;                                // Midtown flanks
  else if (s<13550) h = 32;                               // UES/UWS
  else if (s<17200) h = 17;                               // Harlem
  else h = 24;                                            // Heights/Inwood
  // Downtown cluster
  h += 175 * gauss(Math.hypot((s-1500)/680,(x+280)/500));
  // Midtown mass + 57th supertall ridge
  h += 168 * gauss(Math.hypot((s-8500)/950,(x+300)/720));
  h += 90  * gauss(Math.hypot((s-9330)/300,(x+350)/900));
  // Hudson Yards bump (W 30s far west)
  h += 130 * gauss(Math.hypot((s-7150)/300,(x+1750)/260));
  // avenue canyons
  if (onAve && s>6300 && s<16600) h *= 1.55;
  if (onAve && s<=6300) h *= 1.25;
  return h;
}

/* ============================ RENDERER / SCENE ============================ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, logarithmicDepthBuffer:true, powerPreference:'high-performance'});
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.06;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52, 2, 2, 90000);
camera.position.set(-5600, 3400, 15200);

// global shared uniforms
const GU = {
  time:   {value:0},
  night:  {value:0.02},          // 0 day … 1 full dusk ignition
  cloud:  {value:0.30},
  sunDir: {value:new THREE.Vector3(-0.9,0.2,0.3).normalize()},
  sunCol: {value:new THREE.Color(0xffb46a)},
  fogCol: {value:new THREE.Color(0xf0c896)},
  fogDen: {value:0.000026},
};
scene.fog = new THREE.FogExp2(0xeec39a, 0.000026);

const sun = new THREE.DirectionalLight(0xffb46a, 2.6);
sun.castShadow = true;
sun.shadow.mapSize.set(4096,4096);
sun.shadow.bias = -0.00025; sun.shadow.normalBias = 3.0;
sun.shadow.camera.near = 100; sun.shadow.camera.far = 60000;
scene.add(sun); scene.add(sun.target);
const hemi = new THREE.HemisphereLight(0xffd2a8, 0x6b6a70, 1.05); scene.add(hemi);
const amb = new THREE.AmbientLight(0x6b7591, 0.35); scene.add(amb);
const fill = new THREE.DirectionalLight(0x9db4d8, 0.35); scene.add(fill); scene.add(fill.target);

/* shared GLSL */
const GLSL_H = `
float h21(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
float vnoise2(vec2 p){ vec2 i=floor(p), f=fract(p); f=f*f*(3.-2.*f);
  return mix(mix(h21(i),h21(i+vec2(1,0)),f.x), mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x), f.y); }
float cloudShad(vec2 wp, float t, float amt){
  vec2 p = wp*0.00006 + vec2(t*0.0038, t*0.0013);
  float n = vnoise2(p)*0.5 + vnoise2(p*2.13+vec2(7.7,2.9))*0.3 + vnoise2(p*4.71+vec2(3.1,9.2))*0.2;
  return 1.0 - amt*0.45*smoothstep(0.60,0.92,n);
}`;

// patch a MeshStandardMaterial with world-pos varying + cloud shadows
function patchStd(mat, extra){
  mat.onBeforeCompile = sh => {
    sh.uniforms.uTime = GU.time; sh.uniforms.uCloud = GU.cloud;
    sh.vertexShader = sh.vertexShader
      .replace('#include <common>', '#include <common>\nvarying vec3 vWp;')
      .replace('#include <project_vertex>', `#include <project_vertex>
        vec4 _wp4 = vec4(transformed,1.0);
        #ifdef USE_INSTANCING
          _wp4 = instanceMatrix * _wp4;
        #endif
        vWp = (modelMatrix * _wp4).xyz;`);
    sh.fragmentShader = sh.fragmentShader
      .replace('#include <common>', `#include <common>\nvarying vec3 vWp;\nuniform float uTime;\nuniform float uCloud;\n${GLSL_H}`)
      .replace('#include <color_fragment>', `#include <color_fragment>
        diffuseColor.rgb *= cloudShad(vWp.xz, uTime, uCloud);`);
    if (extra) extra(sh);
  };
  return mat;
}

/* ================================ SKY ==================================== */
const skyU = {
  cTop:{value:new THREE.Color(0x4e7cc4)}, cMid:{value:new THREE.Color(0xdc9a63)},
  cHor:{value:new THREE.Color(0xffd9a0)}, sunDir:GU.sunDir, sunCol:GU.sunCol, night:GU.night,
};
const sky = new THREE.Mesh(new THREE.SphereGeometry(55000, 32, 16),
  new THREE.ShaderMaterial({ side:THREE.BackSide, depthWrite:false, fog:false,
  uniforms: skyU,
  vertexShader:`varying vec3 vDir;
    void main(){ vDir = normalize(position); gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader:`varying vec3 vDir;
    uniform vec3 cTop,cMid,cHor,sunDir,sunCol; uniform float night;
    float h21(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
    void main(){
      float y = clamp(vDir.y,0.,1.);
      float sunSide = pow(clamp(dot(normalize(vDir.xz+vec2(1e-4)), normalize(sunDir.xz+vec2(1e-4)))*0.5+0.5, 0., 1.), 1.6);
      vec3 horC = mix(mix(cTop,cMid,0.45), cHor, sunSide);
      vec3 midC = mix(mix(cTop,cMid,0.7), cMid, sunSide*0.6+0.4);
      vec3 col = mix(horC, midC, smoothstep(0.0,0.16,y));
      col = mix(col, cTop, smoothstep(0.08,0.55,y));
      float sd = max(dot(vDir, sunDir),0.);
      col += sunCol * (pow(sd,900.)*8.0 + pow(sd,28.)*0.55 + pow(sd,6.)*0.14);
      // stars at dusk
      if (night>0.45 && vDir.y>0.03){
        vec2 sp = vDir.xz/(vDir.y+0.25)*260.;
        float st = step(0.9985, h21(floor(sp)));
        col += vec3(0.75,0.8,1.0)*st*(night-0.45)*1.4*h21(floor(sp)+7.1);
      }
      if (vDir.y<0.0) col = cHor*0.85;
      gl_FragColor = vec4(col,1.);
    }`}));
sky.frustumCulled = false;
scene.add(sky);

/* =============================== WATER =================================== */
const waterU = {
  uTime:GU.time, sunDir:GU.sunDir, sunCol:GU.sunCol,
  cDeep:{value:new THREE.Color(0x2a4a68)}, cSky:{value:new THREE.Color(0xdc9a63)},
  fogCol:GU.fogCol, fogDen:GU.fogDen, night:GU.night,
};
const water = new THREE.Mesh(new THREE.PlaneGeometry(90000, 90000, 1, 1),
  new THREE.ShaderMaterial({ uniforms:waterU, fog:false,
  vertexShader:`
    #include <common>
    #include <logdepthbuf_pars_vertex>
    varying vec3 vWp;
    void main(){
      vec4 wp = modelMatrix*vec4(position,1.); vWp = wp.xyz;
      gl_Position = projectionMatrix*viewMatrix*wp;
      #include <logdepthbuf_vertex>
    }`,
  fragmentShader:`
    #include <common>
    #include <logdepthbuf_pars_fragment>
    varying vec3 vWp;
    uniform float uTime,fogDen,night; uniform vec3 sunDir,sunCol,cDeep,cSky,fogCol;
    ${GLSL_H}
    void main(){
      #include <logdepthbuf_fragment>
      vec2 p = vWp.xz;
      float t = uTime;
      // procedural normal from octave slopes
      float e = 2.2;
      float a1 = sin(p.x*0.031+t*0.9)+sin(p.y*0.023-t*0.7)+sin((p.x+p.y)*0.0173+t*0.5);
      float a2 = sin((p.x-p.y)*0.0114-t*0.4)+sin(p.y*0.0083+t*0.33);
      float dW = length(cameraPosition - vWp);
      float sf = clamp(1200.0/max(dW,1.0), 0.15, 1.0);   // waves flatten with distance (anti-moire)
      vec3 n = normalize(vec3((a1*0.034+a2*0.027)*sf, 1.0,
                              (cos(p.y*0.0273+t*0.8)*0.034 + cos((p.x+p.y*0.7)*0.0092-t*0.37)*0.027)*sf));
      vec3 V = normalize(cameraPosition - vWp);
      float fres = pow(1.0-max(dot(n,V),0.0), 3.0);
      vec3 col = mix(cDeep*1.25, cSky, clamp(fres*0.85,0.,1.));
      // sun streak + sparkle
      vec3 R = reflect(-sunDir, n);
      float spec = pow(max(dot(R,V),0.), 260.0);
      float sp2  = pow(max(dot(R,V),0.), 24.0);
      float glit = step(0.986, h21(floor(p*0.9)+floor(t*7.)*0.13));
      col += sunCol*(spec*9.0 + sp2*0.55 + glit*sp2*6.0);
      // dusk city sheen
      col += vec3(0.75,0.62,0.5)*night*0.1;
      col *= cloudShad(p, t, 0.22);
      float d = length(cameraPosition-vWp);
      float f = 1.0-exp(-fogDen*fogDen*d*d*1.4);
      col = mix(col, fogCol, clamp(f,0.,1.));
      gl_FragColor = vec4(col, 1.0);
    }`}));
water.rotation.x = -Math.PI/2;
water.position.y = -0.8;
water.frustumCulled = false;
scene.add(water);

/* ====================== GROUND / ROADS / BLOCKS / PARKS =================== */
const ISLAND = new THREE.Group(); scene.add(ISLAND);

// ---- island slab ----
{
  const shp = new THREE.Shape();
  OUTLINE.forEach((p,i)=>{ const y = p[0]-Z0; i?shp.lineTo(p[1],y):shp.moveTo(p[1],y); });
  for (let i=OUTLINE.length-1;i>=0;i--) shp.lineTo(OUTLINE[i][2], OUTLINE[i][0]-Z0);
  const g = new THREE.ShapeGeometry(shp, 2); g.rotateX(-Math.PI/2); g.scale(1,1,-1); // shape y -> -z … fix below
  // ShapeGeometry rotateX(-PI/2) maps (x,y)->(x,0,-y); our y was s-Z0 = -z, so -y = z. correct, undo the extra scale:
  g.scale(1,1,-1);
  const m = patchStd(new THREE.MeshStandardMaterial({color:0x8f8a80, roughness:.96, metalness:0}));
  const mesh = new THREE.Mesh(g, m); mesh.receiveShadow = true; mesh.position.y = 0.0;
  ISLAND.add(mesh);
}

// ---- road + lane collection ----
const roadGeos = [];         // merged dark asphalt
const lanes = [];            // traffic lanes {ax,ay,az,bx,bz,speed,kind}
function addRoadRect(cx, cz, len, wid, rot=0, y=0.4){
  const g = new THREE.PlaneGeometry(wid, len);
  g.rotateX(-Math.PI/2); if (rot) g.rotateY(rot);
  g.translate(cx, y, cz);
  roadGeos.push(g);
}
function addLane(ax,az,bx,bz,speed,kind,y=1.1){ lanes.push({ax,ay:y,az,bx,bz,speed,kind}); }

// avenues (clipped to island in runs)
AVENUES.forEach((A,ai)=>{
  const [x,s0,s1,w] = A;
  let runS = null;
  for (let s=s0; s<=s1+150; s+=150){
    const ok = s<=s1 && insideIsland(x, s, 25) &&
      !(x>PARK.x0-15 && x<PARK.x1+15 && s>PARK.s0 && s<PARK.s1);
    if (ok && runS===null) runS = s;
    if ((!ok || s>s1) && runS!==null){
      const a=runS, b=s-150;
      if (b-a>250){
        addRoadRect(x, zOfS((a+b)/2), b-a, w+8, 0);
        const dir = ai%2? 1:-1; // alternate one-way
        for (const off of [-5.5,5.5]){
          const d = (Math.abs(x)===180||w>=22)? (off<0?1:-1) : dir; // Park Ave & wide: two-way
          addLane(x+off, zOfS(d>0?a:b), x+off, zOfS(d>0?b:a), rr(11,16), 1);
        }
      }
      runS = null;
    }
  }
});
// numbered streets
const streetRows = [];
for (let n=0;n<=205;n++){
  const s = stS(n); if (s>ISLAND_LEN-450) break;
  const {w,e} = edgeAt(s);
  const wide = WIDE.has(n), sw = wide? 26:13;
  const inPark = n>=59 && n<=110, transverse = [66,79,86,97].includes(n);
  const runs = [];
  if (inPark && !transverse){ runs.push([w+45, PARK.x0]); runs.push([PARK.x1, e-45]); }
  else runs.push([w+45, e-45]);
  for (const [x0,x1] of runs){
    if (x1-x0<80) continue;
    addRoadRect((x0+x1)/2, zOfS(s), x1-x0, (inPark&&transverse&&x0<PARK.x1&&x1>PARK.x0)?12:sw, Math.PI/2);
  }
  streetRows.push({n, s, wide});
}
// street lanes: every 3rd street + all wide streets
for (const row of streetRows){
  const {n,s,wide} = row;
  if (!(wide || n%3===0)) continue;
  const {w,e}=edgeAt(s);
  const inPark = n>=59&&n<=110, transverse=[66,79,86,97].includes(n);
  const runs = (inPark&&!transverse)? [[w+45,PARK.x0],[PARK.x1,e-45]] : [[w+45,e-45]];
  for (const [x0,x1] of runs){
    if (x1-x0<200) continue;
    const z = zOfS(s);
    if (wide){ addLane(x0,z-4,x1,z-4,rr(8,11),0); addLane(x1,z+4,x0,z+4,rr(8,11),0); }
    else { const d = n%2? -1:1; addLane(d>0?x0:x1, z, d>0?x1:x0, z, rr(7,10), 0); }
  }
}
// Broadway + St Nicholas diagonals
function roadPoly(poly, w, kind, speed){
  for (let i=1;i<poly.length;i++){
    const a=poly[i-1], b=poly[i];

const necklacePts = [];   // dusk cable lights
function suspension(ax,az,bx,bz,o){
  const g = new THREE.Group();
  const dx=bx-ax, dz=bz-az, L=Math.hypot(dx,dz), ux=dx/L, uz=dz/L;
  const rot = Math.atan2(dx,dz);
  const mat = new THREE.MeshStandardMaterial({color:o.color, roughness:0.55, metalness:0.35});
  // deck
  const deck = new THREE.Mesh(new THREE.BoxGeometry(o.w, 3, L+30), mat);
  deck.position.set((ax+bx)/2, o.deckY, (az+bz)/2); deck.rotation.y=rot; deck.castShadow=true;
  g.add(deck);
  if (o.doubleDeck){ const d2=deck.clone(); d2.position.y=o.deckY-9; g.add(d2); }
  // towers
  const tX=[0.30,0.70].map(t=>({x:ax+dx*t, z:az+dz*t}));
  for (const T of tX){
    const tw = new THREE.Mesh(new THREE.BoxGeometry(o.stone?14:9, o.towerH, o.w+10), mat);
    tw.position.set(T.x, o.deckY+o.towerH/2-10, T.z); tw.rotation.y=rot; tw.castShadow=true; g.add(tw);
    const cb = new THREE.Mesh(new THREE.BoxGeometry(o.stone?12:7, 8, o.w+14), mat);
    cb.position.set(T.x, o.deckY+o.towerH-14, T.z); cb.rotation.y=rot; g.add(cb);
  }
  // cables (each side)
  const topY = o.deckY+o.towerH-12;
  for (const side of [-1,1]){
    const off = side*o.w/2, ox=Math.cos(rot)*off, oz=-Math.sin(rot)*off;
    const P=(t,y)=>new THREE.Vector3(ax+dx*t+ox, y, az+dz*t+oz);
    const pts=[P(0,o.deckY+4), P(0.30,topY), P(0.5,o.deckY+10), P(0.70,topY), P(1,o.deckY+4)];
    const curve = new THREE.CatmullRomCurve3(pts);
    const tube = new THREE.Mesh(new THREE.TubeGeometry(curve, 60, 1.1, 5), mat);
    g.add(tube);
    // hangers
    const hv=[];
    for (let t=0.06;t<0.99;t+=0.028){
      const p=curve.getPoint(t);
      if (p.y>o.deckY+5){ hv.push(p.x,p.y,p.z, p.x,o.deckY+1.5,p.z); }
    }
    const hg=new THREE.BufferGeometry(); hg.setAttribute('position', new THREE.Float32BufferAttribute(hv,3));
    g.add(new THREE.LineSegments(hg, new THREE.LineBasicMaterial({color:o.color, transparent:true, opacity:0.7})));
    for (let t=0;t<=1.001;t+=0.02){ const p=curve.getPoint(Math.min(t,1)); necklacePts.push(p.x,p.y+1.5,p.z); }
  }
  // traffic on deck
  const nx=Math.cos(rot)*5, nz=-Math.sin(rot)*5;
  addLane(ax+nx,az+nz,bx+nx,bz+nz,rr(13,17),3,o.deckY+2.5);
  addLane(bx-nx,bz-nz,ax-nx,az-nz,rr(13,17),3,o.deckY+2.5);
  scene.add(g);
}

    const dx=(L.bx-L.ax)/ll, dz=(L.bz-L.az)/ll;
    start[i*3]=L.ax; start[i*3+1]=L.ay; start[i*3+2]=L.az;
    dir[i*2]=dx; dir[i*2+1]=dz;

    col[i*3]=c[0]; col[i*3+1]=c[1]; col[i*3+2]=c[2];

  geo.setAttribute('aPhase', new THREE.InstancedBufferAttribute(ph,1));
  geo.setAttribute('aSpeed', new THREE.InstancedBufferAttribute(sp,1));
  geo.setAttribute('aColor', new THREE.InstancedBufferAttribute(col,3));

function updateBoats(dt, density){
  const show = Math.ceil(boats.length*density);
  for (let i=0;i<boats.length;i++){
    const b=boats[i];
    b.g.visible = i<show;
    if (!b.g.visible) continue;
    b.t += dt*b.speed*b.dir/b.total;
    if (b.t>1){b.t=1;b.dir=-1;} if (b.t<0){b.t=0;b.dir=1;}
    // position along polyline
    let dist=b.t*b.total, p0=b.pts[0], p1=b.pts[1];
    for (let j=1;j<b.pts.length;j++){
      const seg=b.pts[j].distanceTo(b.pts[j-1]);
      if (dist<=seg || j===b.pts.length-1){ p0=b.pts[j-1]; p1=b.pts[j]; break; }
      dist-=seg;
    }
    const seg=p1.distanceTo(p0), tt=Math.min(dist/seg,1);
    b.g.position.lerpVectors(p0,p1,tt);
    const ang=Math.atan2((p1.x-p0.x)*b.dir,(p1.z-p0.z)*b.dir);
    b.g.rotation.y=ang;
    b.wake.material.opacity = 0.28*Math.min(b.speed/6,1);
  }
}

function updateDetailPool(camTarget, camDist, budget){
  if (camDist>4200){ wtPool.count=0; hvPool.count=0; trPool.count=0;

  const R = Math.min(400+camDist*0.9, 1500);

    if (dx*dx+dz*dz>R*R) continue;
    const h=rooftopCand[i*5+2], hw=rooftopCand[i*5+3], hd=rooftopCand[i*5+4];
    const s1=hash2(i,17), s2=hash2(i,31), s3=hash2(i,47);
    if (s1<0.5 && wi<POOL_WT*budget){
      _P.set(x+(s2-0.5)*hw, h, z+(s3-0.5)*hd);
      _Q.setFromAxisAngle(_U,s2*6.28); _S.setScalar(0.8+s3*0.5);
      _M.compose(_P,_Q,_S); wtPool.setMatrixAt(wi++,_M);
    }
    if (s2<0.6 && hi<POOL_HV*budget){
      _P.set(x-(s1-0.5)*hw, h, z+(s1-0.5)*hd);
      _Q.setFromAxisAngle(_U,s1*3.0); _S.set(2+s1*3, 1.2+s2*1.8, 1.5+s3*2.5);
      _M.compose(_P,_Q,_S); hvPool.setMatrixAt(hi++,_M);
    }

  wtPool.count=wi; hvPool.count=hi;
  wtPool.instanceMatrix.needsUpdate=true; hvPool.instanceMatrix.needsUpdate=true;

  let ti=0;
  for (let li=0;li<lanes.length && ti<POOL_TR*budget;li++){
    const L=lanes[li]; if (L.kind!==0) continue;
    const mx=(L.ax+L.bx)/2, mz=(L.az+L.bz)/2;
    const ll=Math.hypot(L.bx-L.ax,L.bz-L.az);
    const ddx=mx-camTarget.x, ddz=mz-camTarget.z;
    if (ddx*ddx+ddz*ddz > (R+ll/2)*(R+ll/2)) continue;
    const n=Math.floor(ll/38), ux=(L.bx-L.ax)/ll, uz=(L.bz-L.az)/ll;
    for (let i=0;i<n && ti<POOL_TR*budget;i++){

}

/* ====================== LIGHT MODES ====================================== */
const MODES = [
 { az:262, el:9,  sunC:0xffb46a, sunI:2.6, hemiS:0xffd2a8, hemiG:0x6b6a70, hemiI:1.05,
   ambC:0x8890a8, ambI:0.6, fogC:0xf0c896, fogD:2.6e-5, skyT:0x4e7cc4, skyM:0xdc9a63, skyH:0xffd9a0,
   watD:0x2a4a68, watS:0xdc9a63, night:0.02, expo:1.06 },
 { az:200, el:62, sunC:0xfff2dc, sunI:2.9, hemiS:0xbcd7ff, hemiG:0x5e6a78, hemiI:0.75,
   ambC:0x8b95a4, ambI:0.30, fogC:0xd5e4f0, fogD:1.8e-5, skyT:0x2e6fd6, skyM:0x9fc4ee, skyH:0xe8f2fa,
   watD:0x1e4258, watS:0x9fc4ee, night:0.0, expo:1.0 },
 { az:268, el:1.5,sunC:0xff5a28, sunI:0.55, hemiS:0x3a4c85, hemiG:0x1a2138, hemiI:0.5,
   ambC:0x455484, ambI:0.5, fogC:0x2b3557, fogD:3.2e-5, skyT:0x131f42, skyM:0x35447a, skyH:0xff8a4a,
   watD:0x16223c, watS:0x3a4a84, night:1.0, expo:1.22 },
];
const T = { // live lerp targets
  sunDir:new THREE.Vector3(), sunC:new THREE.Color(), sunI:2.6,
  hemiS:new THREE.Color(), hemiG:new THREE.Color(), hemiI:0.55, ambC:new THREE.Color(), ambI:0.38,
  fogC:new THREE.Color(), fogD:4.2e-5, skyT:new THREE.Color(), skyM:new THREE.Color(), skyH:new THREE.Color(),
  watD:new THREE.Color(), watS:new THREE.Color(), night:0.10, expo:1.06,
};
function setMode(i){
  const m=MODES[i];
  const az=m.az*Math.PI/180, el=m.el*Math.PI/180;
  T.sunDir.set(Math.sin(az)*Math.cos(el), Math.sin(el), -Math.cos(az)*Math.cos(el)).normalize();
  T.sunC.set(m.sunC); T.sunI=m.sunI;
  T.hemiS.set(m.hemiS); T.hemiG.set(m.hemiG); T.hemiI=m.hemiI;
  T.ambC.set(m.ambC); T.ambI=m.ambI;
  T.fogC.set(m.fogC); T.fogD=m.fogD;
  T.skyT.set(m.skyT); T.skyM.set(m.skyM); T.skyH.set(m.skyH);
  T.watD.set(m.watD); T.watS.set(m.watS);
  T.night=m.night; T.expo=m.expo;
}
setMode(0);
GU.sunDir.value.copy(T.sunDir); scene.fog.color = GU.fogCol.value;
function lerpMode(dt){
  const k = 1-Math.exp(-1.8*dt);
  GU.sunDir.value.lerp(T.sunDir,k).normalize();
  GU.sunCol.value.lerp(T.sunC,k); sun.color.copy(GU.sunCol.value);
  sun.intensity += (T.sunI-sun.intensity)*k;
  hemi.color.lerp(T.hemiS,k); hemi.groundColor.lerp(T.hemiG,k); hemi.intensity += (T.hemiI-hemi.intensity)*k;
  amb.color.lerp(T.ambC,k); amb.intensity += (T.ambI-amb.intensity)*k;
  fill.position.copy(controls.target).addScaledVector(GU.sunDir.value, -4000); fill.position.y = 2600;
  fill.target.position.copy(controls.target);
  fill.color.copy(hemi.color).lerp(new THREE.Color(0x9db4d8), 0.5);
  fill.intensity = 0.22 + hemi.intensity*0.18;
  GU.fogCol.value.lerp(T.fogC,k); GU.fogDen.value += (T.fogD-GU.fogDen.value)*k;
  scene.fog.density = GU.fogDen.value;
  skyU.cTop.value.lerp(T.skyT,k); skyU.cMid.value.lerp(T.skyM,k); skyU.cHor.value.lerp(T.skyH,k);
  waterU.cDeep.value.lerp(T.watD,k); waterU.cSky.value.lerp(T.watS,k);
  renderer.toneMappingExposure += (T.expo-renderer.toneMappingExposure)*k;
  // windows ignite progressively, one threshold at a time
  const n=GU.night.value, tgt=T.night;
  GU.night.value = Math.abs(tgt-n)<0.002? tgt : n + Math.sign(tgt-n)*Math.min(Math.abs(tgt-n), dt*0.14);
}

/* ====================== CAMERA / CONTROLS ================================ */
const controls = new OrbitControls(camera, canvas);window.__viewerHook={camera,controls};
controls.enableDamping = true; controls.dampingFactor = 0.075;
controls.minDistance = 55; controls.maxDistance = 26000;
controls.maxPolarAngle = 1.52;
controls.zoomSpeed = 1.15; controls.rotateSpeed = 0.55;
controls.screenSpacePanning = false;
controls.target.set(200, 0, -900);
const PRESETS = [
 {p:[-5600,3400,15200], t:[0,0,-1800]},     // whole-island hero (from SW, sun over NJ)
 {p:[900,750,13800],    t:[-350,200,9200]},  // Downtown harbor orbit
 {p:[-780,115,3950],    t:[-780,45,700]},    // Midtown canyon dive (7th Ave)
 {p:[-640,2100,1000],   t:[-640,0,-1100]},   // Central Park overview
 {p:[2900,620,10600],   t:[500,60,8000]},    // East River bridge sweep
 {p:[-3400,950,-9800],  t:[-300,0,-3600]},   // GWB looking back down the island
];
let fly=null;
function flyTo(i){
  const P=PRESETS[i];
  fly={ t:0, dur:3.0,
    p0:camera.position.clone(), t0:controls.target.clone(),
    p1:new THREE.Vector3(...P.p), t1:new THREE.Vector3(...P.t) };
  fly.arc = Math.min(fly.p0.distanceTo(fly.p1)*0.14, 1600);
}
function updateFly(dt){
  if (!fly) return;
  fly.t += dt/fly.dur;
  let u = Math.min(fly.t,1); u = u*u*(3-2*u);
  camera.position.lerpVectors(fly.p0, fly.p1, u);
  camera.position.y += Math.sin(u*Math.PI)*fly.arc;
  controls.target.lerpVectors(fly.t0, fly.t1, u);
  if (fly.t>=1) fly=null;
}
flyTo(0); fly.t=1; updateFly(0); fly=null;
camera.position.set(...PRESETS[0].p);
// deep-link support: #v=<preset>&l=<lightmode>
{
  const hp = new URLSearchParams(location.hash.slice(1));
  if (hp.has('v')){ const P=PRESETS[+hp.get('v')||0];
    camera.position.set(...P.p); controls.target.set(...P.t); }
  if (hp.has('l')){ const li=+hp.get('l')||0; setMode(li); GU.night.value=MODES[li].night;
    for (let i=0;i<120;i++) lerpMode(0.1);   // snap lighting for deep links
  }
  if (hp.has('cam')){ const a=hp.get('cam').split(',').map(Number);
    camera.position.set(a[0],a[1],a[2]); controls.target.set(a[3],a[4],a[5]); }
}

/* ====================== QUALITY / UI ===================================== */
let qual=1, carFactor=0.65, poolBudget=0.7, trafSl=0.7, boatSl=0.7;
function applyQuality(){
  const dpr=[1,1.5,2][qual];
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, dpr));
  const sm=[1024,2048,4096][qual];
  if (sun.shadow.mapSize.x!==sm){
    sun.shadow.mapSize.set(sm,sm);
    if (sun.shadow.map){ sun.shadow.map.dispose(); sun.shadow.map=null; }
  }
  carFactor=[0.35,0.65,1][qual]; poolBudget=[0.35,0.7,1][qual];
  tMesh.castShadow = qual>0;
  updateTrafficCount();
}
function updateTrafficCount(){
  trafficMesh.geometry.instanceCount = Math.floor(MAXCARS*carFactor*trafSl);
}
document.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('[data-v]').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  flyTo(+b.dataset.v);
});
document.querySelectorAll('[data-l]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('[data-l]').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  setMode(+b.dataset.l);
});
document.getElementById('trafD').oninput=e=>{ trafSl=e.target.value/100; updateTrafficCount(); };
document.getElementById('boatD').oninput=e=>{ boatSl=e.target.value/100; };
document.getElementById('qual').onchange=e=>{ qual=+e.target.value; applyQuality(); };
document.getElementById('photo').onclick=()=>document.body.classList.toggle('photo');
document.getElementById('reset').onclick=()=>flyTo(0);
window.addEventListener('keydown',e=>{ if(e.key==='r'||e.key==='R') flyTo(0); });
setTimeout(()=>{ const h=document.getElementById('hint'); if(h) h.style.opacity=0; }, 9000);
applyQuality();

function onResize(){
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize); onResize();

/* ====================== MAIN LOOP ======================================== */
let lastT=0, poolT=0, fpsAcc=0, fpsN=0, fpsBadT=0, poolInit=false;
function tick(tms){
  requestAnimationFrame(tick);
  const t=tms/1000;
  const dt=Math.min(0.05, t-lastT||0.016); lastT=t;
  GU.time.value=t;
  lerpMode(dt);
  updateFly(dt);
  controls.enabled = !fly;
  controls.update();
  // keep the target on the world
  const tg=controls.target;
  tg.x=THREE.MathUtils.clamp(tg.x,-9000,9000);
  tg.z=THREE.MathUtils.clamp(tg.z,-14000,17000);
  tg.y=THREE.MathUtils.clamp(tg.y,0,600);
  if (camera.position.y<4) camera.position.y=4;
  const camDist=camera.position.distanceTo(tg);
  // sun + tracking shadow frustum (near tier crisp, far tier district-scale)
  sun.position.copy(tg).addScaledVector(GU.sunDir.value, Math.max(camDist*1.7, 2600));
  sun.target.position.copy(tg);
  const sz=THREE.MathUtils.clamp(camDist*1.5, 420, 26000);
  const sc=sun.shadow.camera;
  if (Math.abs(sc.right-sz)>sz*0.15){ sc.left=-sz; sc.right=sz; sc.top=sz; sc.bottom=-sz;
    sc.near=10; sc.far=Math.max(camDist*4,7000); sun.shadow.normalBias=Math.max(2,sz*0.0007); sc.updateProjectionMatrix(); }
  // life
  updateBoats(dt, boatSl);
  for (let i=0;i<helis.length;i++){
    const h=helis[i];
    const zz = 12000 - ((t*h.spd + h.ph*300)% 22000);
    h.g.position.set(h.x + Math.sin(zz*0.0004+i)*180, h.y, zz);
    h.g.rotation.y = Math.PI;
    h.rotor.material.opacity = 0.14+0.14*Math.sin(t*42+i*3);
    h.blink.visible = Math.sin(t*7+i*2)>0.4;
  }
  { const u=((t*0.018)%1);
    jet.position.set(8500-9500*u, 1500-1050*u, 10000-14000*u);
    jet.rotation.y=Math.atan2(-9500,-14000); }
  contrails.forEach((c,i)=>{ c.position.x += dt*(2+i); if (c.position.x>9000) c.position.x=-9000; });
  { const cx=-640, cz=-600;
    for (let i=0;i<40;i++){
      const a=t*0.25+i*0.157, r=190+45*Math.sin(t*0.21+i*1.7);
      birdPts[i*3]=cx+Math.cos(a)*r+Math.sin(i*7.7)*60;
      birdPts[i*3+1]=85+26*Math.sin(t*0.7+i);
      birdPts[i*3+2]=cz+Math.sin(a)*r+Math.cos(i*3.3)*60;
    }
    birdGeo.attributes.position.needsUpdate=true; }
  poolT+=dt;
  if (poolT>0.35 || !poolInit){ poolInit=true; poolT=0; updateDetailPool(tg, camDist, poolBudget); }
  updateSteam(tg, camDist);
  renderer.render(scene, camera);
  // fps watchdog: degrade quality before degrading the island
  fpsAcc+=dt; fpsN++;
  if (fpsAcc>1){ const fps=fpsN/fpsAcc; fpsAcc=0; fpsN=0;
    if (fps<23 && qual>0){ fpsBadT++; if (fpsBadT>=3){ qual--; document.getElementById('qual').value=qual; applyQuality(); fpsBadT=0; } }
    else fpsBadT=0;
  }
}
requestAnimationFrame(tick);
console.log('[manhattan] buildings:', bMesh.count, 'trees:', tMesh.count, 'cars(max):', MAXCARS,
  'lanes:', lanes.length, 'rooftop candidates:', (rooftopCand.length/5)|0, 'boats:', boats.length);
</script>
