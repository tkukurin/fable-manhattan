<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manhattan — Whole Island, Alive</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1a1410;font-family:system-ui,-apple-system,sans-serif}
  #c{display:block;width:100%;height:100%}
  #ui{position:fixed;left:14px;bottom:14px;display:flex;flex-direction:column;gap:8px;color:#ffe9c9;
      background:rgba(20,14,8,.62);backdrop-filter:blur(8px);padding:12px 14px;border-radius:12px;
      border:1px solid rgba(255,200,120,.18);font-size:12px;user-select:none;max-width:340px}
  #ui .row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  #ui button,#ui select{background:rgba(255,190,90,.12);color:#ffe9c9;border:1px solid rgba(255,200,120,.28);
      border-radius:7px;padding:4px 9px;font-size:11.5px;cursor:pointer}
  #ui button:hover{background:rgba(255,190,90,.3)}
  #ui input[type=range]{width:90px;accent-color:#ffb347}
  #ui .lbl{opacity:.75;min-width:52px}
  .hint{position:fixed;right:14px;bottom:14px;color:rgba(255,233,201,.55);font-size:11px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="row" style="font-weight:600;letter-spacing:.4px;opacity:.9">MANHATTAN · complete island</div>
  <div class="row">
    <span class="lbl">Views</span>
    <button data-p="hero">Island</button><button data-p="downtown">Harbor</button>
    <button data-p="midtown">Canyon</button><button data-p="park">Park</button>
    <button data-p="bridges">Bridges</button><button data-p="gwb">GW North</button>
  </div>
  <div class="row">
    <span class="lbl">Light</span>
    <select id="light"><option value="golden" selected>Golden hour</option><option value="noon">Clear noon</option><option value="dusk">Dusk — city lights</option></select>
    <select id="quality"><option value="high" selected>High</option><option value="med">Medium</option><option value="low">Low</option></select>
  </div>
  <div class="row">
    <span class="lbl">Traffic</span><input id="traffic" type="range" min="0" max="1" step="0.01" value="0.8">
    <span class="lbl">Boats</span><input id="boats" type="range" min="0" max="1" step="0.01" value="1">
  </div>
  <div class="row"><button id="reset">Reset view (R)</button><button id="photo">Photo mode (H)</button></div>
</div>
<div class="hint">drag orbit · right-drag pan · scroll dive to street level</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import * as BGU from 'three/addons/utils/BufferGeometryUtils.js';

/* ---------------- basics ---------------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,logarithmicDepthBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,2,120000);
const controls=new OrbitControls(camera,canvas);window.__viewerHook={camera,controls};
controls.enableDamping=true; controls.dampingFactor=0.06;
controls.minDistance=25; controls.maxDistance=45000;
controls.maxPolarAngle=Math.PI*0.495; controls.zoomSpeed=1.15; controls.rotateSpeed=0.7;

/* deterministic rng */
let _s=1234567; const rnd=()=>((_s=Math.imul(_s^_s>>>15,_s|1),_s^=_s+Math.imul(_s^_s>>>7,_s|61),((_s^_s>>>14)>>>0)/4294967296));
const rr=(a,b)=>a+rnd()*(b-a);
const hash2=(x,y)=>{let h=Math.sin(x*127.1+y*311.7)*43758.5453;return h-Math.floor(h);};
const noise2=(x,y)=>{const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi,
 s=(t)=>t*t*(3-2*t),u=s(xf),v=s(yf);
 return hash2(xi,yi)*(1-u)*(1-v)+hash2(xi+1,yi)*u*(1-v)+hash2(xi,yi+1)*(1-u)*v+hash2(xi+1,yi+1)*u*v;};

/* ---------------- island geography (metres, z north 0..21500) ---------------- */
const L=21500;
const CPTS=[[0,0],[2000,120],[4000,260],[6000,360],[9000,420],[12000,420],[15000,300],[18000,80],[20000,-150],[21500,-260]];
const WPTS=[[0,650],[900,1750],[2000,2600],[4000,3050],[6000,3620],[9000,3450],[12000,3320],[14000,3120],[16000,2620],[18000,1900],[20000,1250],[21500,520]];
function interp(pts,z){z=Math.max(pts[0][0],Math.min(pts[pts.length-1][0],z));
 for(let i=1;i<pts.length;i++) if(z<=pts[i][0]){const [z0,v0]=pts[i-1],[z1,v1]=pts[i];const t=(z-z0)/(z1-z0);return v0+(v1-v0)*(t*t*(3-2*t));}
 return pts[pts.length-1][1];}
const cx=z=>interp(CPTS,z)+140*noise2(z*0.0006,3.7)-70;
const wid=z=>interp(WPTS,z)*(0.96+0.08*noise2(z*0.0011,9.2));
const westEdge=z=>cx(z)-wid(z)/2, eastEdge=z=>cx(z)+wid(z)/2;
const onIsland=(x,z)=>z>=0&&z<=L&&x>westEdge(z)&&x<eastEdge(z);

/* Central Park */
const PK={z0:9750,z1:13780,x0:z=>cx(z)-330,x1:z=>cx(z)+470};
const inPark=(x,z)=>z>PK.z0&&z<PK.z1&&x>PK.x0(z)&&x<PK.x1(z);
/* Broadway diagonal */
const bway=z=>{ if(z<3200) return cx(z)+150;
 if(z<9750){const t=(z-3200)/(9750-3200); return (cx(z)+150)*(1-t)+(cx(z)-420)*t;}
 return cx(z)-420-Math.min(300,(z-9750)*0.05);};
/* green pockets: [z,xoff-from-cx,w,d] */
const POCKETS=[[5050,-80,170,170],[5900,60,140,120],[6520,40,130,150],[8830,-140,140,90],
 [5250,760,180,170],[4550,-950,150,130],[16000,60,120,100],[14600,-60,110,90]];
const inPocket=(x,z)=>POCKETS.some(p=>Math.abs(z-p[0])<p[3]/2&&Math.abs(x-cx(z)-p[1])<p[2]/2);
/* Stuyvesant superblock */
const inStuy=(x,z)=>z>5450&&z<6050&&x>eastEdge(z)-620&&x<eastEdge(z)-80;
/* Riverside + north ridge parks + East River park */
const inGreenEdge=(x,z)=>
 (z>9600&&z<17200&&x<westEdge(z)+130)||
 (z>4200&&z<7800&&x>eastEdge(z)-110)||
 (z>19200&&x<cx(z)+wid(z)*0.12)||
 (z>20700);
const isGreen=(x,z)=>inPark(x,z)||inPocket(x,z)||inGreenEdge(x,z);

/* district base heights */
function districtH(x,z){
 const d=Math.abs(x-cx(z))/(wid(z)/2); const n=noise2(x*0.004,z*0.004);
 let h;
 if(z<2100){ h=30+n*50; const core=Math.exp(-Math.pow((z-1100)/650,2))*(1-d*0.7);
   if(rnd()<0.16+core*0.5) h=60+Math.pow(rnd(),1.6)*(90+core*220);}
 else if(z<4300){ h=16+n*22+(rnd()<0.05?rr(40,90):0);}
 else if(z<7300){ h=20+n*32+(rnd()<0.08?rr(50,140):0); if(Math.abs(x-cx(z))<500&&z>6200) h+=15;}
 else if(z<8250){ h=35+n*50+(rnd()<0.2?rr(60,160):0);}
 else if(z<10800){ const core=Math.exp(-Math.pow((z-9100)/900,2))*Math.exp(-Math.pow((x-cx(z))/900,2));
   h=45+n*60+core*(60+Math.pow(rnd(),1.5)*230); if(rnd()<0.12+core*0.35) h+=rr(40,140);}
 else if(z<13800){ const nearPark=Math.abs(x-cx(z))<900; h=nearPark?(45+n*55):(28+n*40); if(rnd()<0.06)h+=rr(30,90);}
 else if(z<17500){ h=18+n*24; const cell=hash2(Math.floor(x/450),Math.floor(z/450));
   if(cell<0.13) h=52+n*14; else if(rnd()<0.04) h=rr(40,75);}
 else{ h=15+n*20+(rnd()<0.03?rr(30,55):0);}
 return h;
}
/* palettes: [r,g,b] warm masonry / limestone / glass */
function bColor(h,z,out){
 const r=rnd();
 if(h>110||(h>70&&r<0.5)){ // glass
   const g=rr(0.0,1.0); out[0]=0.28+g*0.14; out[1]=0.34+g*0.15; out[2]=0.42+g*0.18;
   if(rnd()<0.25){out[0]*=1.25;out[1]*=1.05;out[2]*=0.8;} // bronze glass
 }else if(r<0.42){ // brick
   const t=rnd(); out[0]=0.48+t*0.2; out[1]=0.26+t*0.12; out[2]=0.2+t*0.08;
 }else if(r<0.75){ // limestone / terracotta
   const t=rnd(); out[0]=0.62+t*0.2; out[1]=0.56+t*0.18; out[2]=0.46+t*0.15;
 }else{ // concrete
   const t=rnd(); out[0]=0.5+t*0.14; out[1]=0.48+t*0.13; out[2]=0.45+t*0.12;
 }
}

/* ---------------- lighting / sky ---------------- */
const sun=new THREE.DirectionalLight(0xffffff,2.4);
sun.castShadow=true; sun.shadow.mapSize.set(4096,4096);
const SC=13000; Object.assign(sun.shadow.camera,{left:-SC,right:SC,top:SC,bottom:-SC,near:100,far:60000});
sun.shadow.bias=-0.0004; sun.shadow.normalBias=6;
sun.target.position.set(0,0,L/2); scene.add(sun,sun.target);
const hemi=new THREE.HemisphereLight(0xbdd7ff,0x5c4a33,0.55); scene.add(hemi);
const amb=new THREE.AmbientLight(0xffffff,0.12); scene.add(amb);

const skyUni={uTop:{value:new THREE.Color()},uHor:{value:new THREE.Color()},uSun:{value:new THREE.Color()},uSunDir:{value:new THREE.Vector3()}};
const sky=new THREE.Mesh(new THREE.SphereGeometry(90000,32,16),new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,
 uniforms:skyUni,
 vertexShader:`varying vec3 vD;void main(){vD=normalize(position);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
 fragmentShader:`varying vec3 vD;uniform vec3 uTop,uHor,uSun,uSunDir;
 void main(){float h=clamp(vD.y,0.,1.);vec3 c=mix(uHor,uTop,pow(h,0.55));
 float s=pow(max(dot(normalize(vD),normalize(uSunDir)),0.),24.);
 c+=uSun*s*1.6; c+=uSun*pow(max(dot(normalize(vD),normalize(uSunDir)),0.),3.)*0.25*(1.-h);
 gl_FragColor=vec4(c,1.);}`}));
sky.position.z=L/2; scene.add(sky);
scene.fog=new THREE.Fog(0xf2b47a,9000,70000);

/* mode-shared uniforms */
const uTime={value:0}, uGlow={value:0}, uNight={value:0}, uSunDirW={value:new THREE.Vector3(1,1,0)};

/* ---------------- water ---------------- */
const waterUni={uTime,uSunDir:uSunDirW,uDeep:{value:new THREE.Color(0x1d3a52)},uGlint:{value:new THREE.Color(0xffcf8a)},uNight};
const water=new THREE.Mesh(new THREE.PlaneGeometry(140000,140000,1,1),new THREE.ShaderMaterial({
 uniforms:waterUni,fog:false,
 vertexShader:`varying vec3 vW;void main(){vW=(modelMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
 fragmentShader:`varying vec3 vW;uniform float uTime,uNight;uniform vec3 uSunDir,uDeep,uGlint;
 float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
 void main(){
  vec2 p=vW.xz*0.02;
  float w=sin(p.x*3.1+uTime*0.9)*0.5+sin(p.y*2.3-uTime*0.7)*0.5+sin((p.x+p.y)*4.7+uTime*1.3)*0.35;
  vec3 n=normalize(vec3(w*0.12+ (h(floor(vW.xz*0.35+uTime*1.2))-0.5)*0.22,1.,w*0.1));
  vec3 V=normalize(cameraPosition-vW);
  float spec=pow(max(dot(reflect(-normalize(uSunDir),n),V),0.),90.);
  float fres=pow(1.-max(dot(V,vec3(0,1,0)),0.),2.5);
  vec3 skyRef=mix(uDeep*2.6,uGlint,fres*0.85);
  vec3 c=mix(uDeep*1.6,skyRef,0.45+fres*0.5)+uGlint*spec*2.6;
  c=mix(c,c*0.4+vec3(0.03,0.05,0.1),uNight*0.55);
  float d=length(cameraPosition-vW);
  gl_FragColor=vec4(mix(c,uGlint*0.55+uDeep*0.4,smoothstep(15000.,70000.,d)),1.);}`}));
water.rotation.x=-Math.PI/2; water.position.set(0,0,L/2); scene.add(water);

/* ---------------- island ground ---------------- */
(function(){
 const pts=[],N=140;
 for(let i=0;i<=N;i++){const z=i/N*L;pts.push(new THREE.Vector2(westEdge(z),z));}
 for(let i=N;i>=0;i--){const z=i/N*L;pts.push(new THREE.Vector2(eastEdge(z),z));}
 const shape=new THREE.Shape(pts);
 const g=new THREE.ExtrudeGeometry(shape,{depth:7,bevelEnabled:false});
 g.rotateX(-Math.PI/2); g.translate(0,7,0);
 const m=new THREE.Mesh(g,new THREE.MeshLambertMaterial({color:0x3a3632}));
 m.receiveShadow=true; scene.add(m);
})();

/* ---------------- procedural city ---------------- */
const boxGeo=new THREE.BoxGeometry(1,1,1); boxGeo.translate(0,0.5,0);
const MAXB=62000;
const bmat=new THREE.MeshLambertMaterial({color:0xffffff});
/* window shader injection */
bmat.onBeforeCompile=(sh)=>{
 sh.uniforms.uGlow=uGlow; sh.uniforms.uSunDir=uSunDirW; sh.uniforms.uNight=uNight;
 sh.vertexShader=sh.vertexShader.replace('#include <common>','#include <common>\nvarying vec3 vWp;varying vec3 vN;')
  .replace('#include <worldpos_vertex>','#include <worldpos_vertex>\nvWp=(modelMatrix*(instanceMatrix*vec4(transformed,1.))).xyz;vN=normalize(mat3(instanceMatrix)*normal);');
 sh.fragmentShader=sh.fragmentShader.replace('#include <common>','#include <common>\nvarying vec3 vWp;varying vec3 vN;uniform float uGlow;uniform float uNight;uniform vec3 uSunDir;\nfloat wh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}')
  .replace('#include <dithering_fragment>',`
   float side=step(abs(vN.y),0.6);
   float u=mix(vWp.x,vWp.z,step(abs(vN.z),abs(vN.x)));
   vec2 cell=vec2(floor(u/3.4),floor(vWp.y/3.9));
   vec2 f=vec2(fract(u/3.4),fract(vWp.y/3.9));
   float win=step(0.22,f.x)*step(f.x,0.82)*step(0.18,f.y)*step(f.y,0.78)*side;
   float rowBand=step(0.94,fract(vWp.y/3.9))*side; // cornice-ish line
   gl_FragColor.rgb*=1.0-win*0.42-rowBand*0.15;
   float rw=wh(cell+floor(vWp.zx*0.01));
   float sunFace=pow(max(dot(vN,normalize(uSunDir)),0.),3.);
   gl_FragColor.rgb+=win*sunFace*(0.25+0.9*step(0.86,rw))*vec3(1.0,0.75,0.45)*(1.0-uNight); // sun mirrors
   float lit=step(1.0-uGlow*(0.55+0.45*wh(cell*1.7)),rw);
   gl_FragColor.rgb+=win*lit*vec3(1.0,0.72,0.38)*(1.4+rw)*uGlow;
   #include <dithering_fragment>`);
};
const buildings=new THREE.InstancedMesh(boxGeo,bmat,MAXB);
buildings.castShadow=true; buildings.receiveShadow=true;
const _m=new THREE.Matrix4(),_q=new THREE.Quaternion(),_p=new THREE.Vector3(),_sc=new THREE.Vector3(),_c=new THREE.Color();
let bi=0; const col=[0,0,0];
const towerSpots=[]; // for water towers/HVAC
function addBox(x,z,w,d,h,rot,cr,cg,cb){
 if(bi>=MAXB)return;
 _p.set(x,7,z); _q.setFromAxisAngle(new THREE.Vector3(0,1,0),rot); _sc.set(w,h,d);
 _m.compose(_p,_q,_sc); buildings.setMatrixAt(bi,_m);
 _c.setRGB(cr,cg,cb); buildings.setColorAt(bi,_c); bi++;
}
function addBuilding(x,z,w,d,rot){
 if(isGreen(x,z)||inStuy(x,z))return;
 if(Math.abs(x-bway(z))<24)return; // Broadway cut
 let h=districtH(x,z);
 bColor(h,z,col);
 if(h>90){ // setback tiers
  addBox(x,z,w,d,h*0.45,rot,col[0],col[1],col[2]);
  addBox(x,z,w*0.78,d*0.78,h*0.75,rot,col[0]*0.98,col[1]*0.98,col[2]);
  addBox(x,z,w*0.55,d*0.55,h,rot,col[0],col[1],col[2]*1.02);
 }else addBox(x,z,w,d,h,rot,col[0],col[1],col[2]);
 if(h>25&&h<95&&rnd()<0.38) towerSpots.push([x+rr(-w/3,w/3),h+7,z+rr(-d/3,d/3),0]);
 if(h>40&&rnd()<0.45) towerSpots.push([x+rr(-w/3,w/3),h*(h>90?1:1)+7,z+rr(-d/3,d/3),1]);
}
/* block pads */
const pads=[];
/* uptown grid (z>3100) */
for(let z=3150;z<L;z+=82){
 const w=wid(z),c0=cx(z);
 for(let x=westEdge(z)+60;x<eastEdge(z)-60;x+=264){
  const bx=x+132; if(!onIsland(bx,z))continue;
  if(!isGreen(bx,z)&&!inStuy(bx,z))pads.push([bx,z,238,62]);
  const n=5+Math.floor(rnd()*5);
  for(let k=0;k<n;k++){
   const lx=x+22+rnd()*216, lz=z+rr(-20,20);
   if(!onIsland(lx,lz))continue;
   addBuilding(lx,lz,rr(20,54),rr(22,46),0);
  }
 }
}
/* downtown irregular (z<3150) */
for(let z=60;z<3150;z+=68){
 for(let x=westEdge(z)+40;x<eastEdge(z)-40;x+=78){
  if(rnd()<0.16)continue;
  const jx=x+rr(-15,15),jz=z+rr(-14,14);
  if(!onIsland(jx,jz))continue;
  addBuilding(jx,jz,rr(24,60),rr(24,55),rr(-0.35,0.1));
  if(rnd()<0.4)pads.push([jx,jz,rr(60,90),rr(50,70)]);
 }
}
/* Stuy town towers on green */
for(let i=0;i<14;i++){const z=rr(5500,6000),x=rr(eastEdge(z)-580,eastEdge(z)-120);
 addBox(x,z,26,26,rr(38,44),rr(0,3.14),0.5,0.34,0.26);}
buildings.instanceMatrix.needsUpdate=true;
if(buildings.instanceColor)buildings.instanceColor.needsUpdate=true;
buildings.count=bi; scene.add(buildings);
console.log('buildings:',bi);

/* block pads instanced */
{const g=new THREE.BoxGeometry(1,1,1);g.translate(0,0.5,0);
 const pm=new THREE.InstancedMesh(g,new THREE.MeshLambertMaterial({color:0x59544c}),pads.length);
 pads.forEach((p,i)=>{_p.set(p[0],7,p[1]);_q.identity();_sc.set(p[2],0.7,p[3]);_m.compose(_p,_q,_sc);pm.setMatrixAt(i,_m);});
 pm.receiveShadow=true; scene.add(pm);}

/* ---------------- landmarks ---------------- */
const LM=new THREE.Group(); scene.add(LM);
const lam=(c)=>new THREE.MeshLambertMaterial({color:c});
function box(w,h,d,c,x,z,y=7,ry=0){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),lam(c));
 m.position.set(x,y+h/2,z);m.rotation.y=ry;m.castShadow=m.receiveShadow=true;LM.add(m);return m;}
const glass=0x4a6478,glassD=0x2e3f4e,stone=0xcbb99a,terra=0xe8e0d0,brick=0x8a4a38;
(()=>{const c0=cx(900);
 // One WTC — tapered antiprism feel
 const g=new THREE.CylinderGeometry(24,42,417,4,1); g.rotateY(Math.PI/4);
 const w=new THREE.Mesh(g,lam(0x5b7488)); w.position.set(c0-320,7+208+57,900); w.castShadow=true; LM.add(w);
 box(60,57,60,glassD,c0-320,900); box(4,110,4,0xcccccc,c0-320,900,7+417+57);
 box(48,230,48,glass,c0-180,700); box(42,190,42,glassD,c0-420,1150); box(40,180,40,glass,c0-100,1250);
 box(34,241,34,terra,c0+40,1520); // Woolworth
 box(46,170,46,stone,c0+120,850); box(40,200,40,glassD,c0-40,1050);
})();
(()=>{ // Flatiron wedge
 const z=6480,x=cx(z)+20;
 const s=new THREE.Shape([new THREE.Vector2(0,0),new THREE.Vector2(26,88),new THREE.Vector2(-26,88)].map(v=>v));
 const g=new THREE.ExtrudeGeometry(s,{depth:87,bevelEnabled:false}); g.rotateX(-Math.PI/2);
 const m=new THREE.Mesh(g,lam(stone)); m.position.set(x,7+87,z-44); m.rotation.x=Math.PI; m.castShadow=true; LM.add(m);
})();
(()=>{ // Empire State
 const z=8280,x=cx(z)-60;
 box(120,20,60,stone,x,z); box(80,150,50,stone,x,z,27); box(52,200,40,stone,x,z,120);
 box(30,63,26,stone,x,z,320); box(8,60,8,0xd8d8e0,x,z,383);
})();
(()=>{ // Chrysler
 const z=8880,x=cx(z)+470;
 box(52,220,52,0xb8bcc4,x,z);
 for(let i=0;i<5;i++)box(40-i*7,14,40-i*7,0xd9dde6,x,z,7+220+i*13);
 box(3,38,3,0xe8ecf4,x,z,7+220+5*13);
})();
(()=>{ // Grand Central low mass + MetLife slab
 const z=8760,x=cx(z)+330;
 box(140,38,90,stone,x,z); box(90,246,30,0x8f9aa6,x,z-70);
})();

const bridgeLights=[];
function bridge(x0,z0,x1,z1,towerH,c,deckW=16){
 const g=new THREE.Group(); const dx=x1-x0,dz=z1-z0,len=Math.hypot(dx,dz),ang=Math.atan2(dx,dz);
 const deck=new THREE.Mesh(new THREE.BoxGeometry(deckW,4,len),lam(0x5a544c));
 deck.position.set((x0+x1)/2,32,(z0+z1)/2); deck.rotation.y=ang; deck.castShadow=true; g.add(deck);
 for(const t of [0.3,0.7]){
  const tw=new THREE.Mesh(new THREE.BoxGeometry(deckW*0.5,towerH,10),lam(c));
  tw.position.set(x0+dx*t,towerH/2+6,z0+dz*t); tw.rotation.y=ang; tw.castShadow=true; g.add(tw);
 }
 // cables + necklace points
 const pts=[],lp=[];
 for(let i=0;i<=60;i++){const t=i/60;
  let y=34; const seg=(t<0.3)?t/0.3:(t<0.7)?(t-0.3)/0.4:(1-t)/0.3;
  if(t<0.3||t>0.7)y=34+(towerH-30)*Math.pow(1-seg,1.6)*0+((towerH+6)-34)*Math.pow(1-seg,1.8);
  else y=34+(towerH-28)*Math.pow(Math.abs(t-0.5)/0.2,2);
  const px=x0+dx*t,pz=z0+dz*t;
  pts.push(new THREE.Vector3(px,y,pz)); lp.push(px,y+2,pz);
 }
 g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x3c3c44})));
 const lg=new THREE.BufferGeometry(); lg.setAttribute('position',new THREE.Float32BufferAttribute(lp,3));
 const lm=new THREE.PointsMaterial({color:0xffd890,size:9,sizeAttenuation:true,transparent:true,opacity:0});
 const necklace=new THREE.Points(lg,lm); g.add(necklace); bridgeLights.push(lm);
 scene.add(g); return {x0,z0,x1,z1};
}

 vertexShader:`attribute vec3 aStart;attribute vec2 aDir;attribute float aLen,aSpeed,aPhase;attribute vec3 aCol;
 uniform float uTime;varying vec3 vC;varying vec3 vN;varying float vHead;
 void main(){
  float d=mod(aPhase+uTime*aSpeed,aLen);
  d-=6.0*max(0.,sin(d*0.03+aPhase))*step(0.7,sin(d*0.03+aPhase)); // subtle bunching
  vec3 p=position; vec3 rp=vec3(p.x*aDir.y+p.z*aDir.x,p.y,-p.x*aDir.x+p.z*aDir.y);

  vec3 wp=aStart+vec3(aDir.x,0.,aDir.y)*d+rp;
  vC=aCol; vN=normalize(vec3(0.,1.,0.)); vHead=step(0.7,position.x);
  gl_Position=projectionMatrix*viewMatrix*vec4(wp,1.);}`,
 fragmentShader:`uniform float uNight;uniform vec3 uSunDir;varying vec3 vC;varying float vHead;

 sun.color.set(m.sunC); sun.intensity=m.sunI; hemi.intensity=m.hemi; amb.intensity=m.amb;
 skyUni.uTop.value.set(m.top); skyUni.uHor.value.set(m.hor); skyUni.uSun.value.set(m.glowSky);
 skyUni.uSunDir.value.copy(uSunDirW.value);
 scene.fog.color.set(m.fog[0]); scene.fog.near=m.fog[1]; scene.fog.far=m.fog[2];
 waterUni.uDeep.value.set(m.deep); waterUni.uGlint.value.set(m.glint);
 renderer.toneMappingExposure=m.exp;
 modeGlowTarget=m.glow; nightTarget=m.night; neckTarget=m.neck;
}
setMode('golden');

/* ---------------- camera presets ---------------- */
const PRESETS={
 hero:{p:[-7600,4500,-2600],t:[cx(9800),0,10600]},
 downtown:{p:[-2600,900,-2400],t:[cx(1000)-150,180,1100]},
 midtown:{p:[cx(9000)-1500,340,7300],t:[cx(9000),120,9200]},
 park:{p:[cx(11700)-2100,1500,11400],t:[cx(11700)+100,0,11800]},
 bridges:{p:[eastEdge(2500)+2600,700,300],t:[eastEdge(1500),60,1600]},
 gwb:{p:[westEdge(19100)-2600,1500,20800],t:[cx(15000),0,13500]},
};
let flight=null;
function flyTo(name){
 const pr=PRESETS[name];
 flight={t:0,p0:camera.position.clone(),t0:controls.target.clone(),
  p1:new THREE.Vector3(...pr.p),t1:new THREE.Vector3(...pr.t)};
}
camera.position.set(...PRESETS.hero.p); controls.target.set(...PRESETS.hero.t); controls.update();

/* ---------------- UI ---------------- */
document.querySelectorAll('#ui button[data-p]').forEach(b=>b.onclick=()=>flyTo(b.dataset.p));
document.getElementById('reset').onclick=()=>flyTo('hero');
document.getElementById('light').onchange=e=>setMode(e.target.value);
document.getElementById('traffic').oninput=e=>{tg.instanceCount=Math.floor(NV*e.target.value);};
document.getElementById('boats').oninput=e=>{boatGroup.visible=e.target.value>0.02;
 boatGroup.children.forEach((c,i)=>c.visible=i/boatGroup.children.length<e.target.value);};
const ui=document.getElementById('ui'),hint=document.querySelector('.hint');
function togglePhoto(){const v=ui.style.display!=='none';ui.style.display=v?'none':'flex';hint.style.display=v?'none':'block';}
document.getElementById('photo').onclick=togglePhoto;
addEventListener('keydown',e=>{if(e.key==='r'||e.key==='R')flyTo('hero');if(e.key==='h'||e.key==='H')togglePhoto();});
document.getElementById('quality').onchange=e=>{
 const q=e.target.value;
 renderer.setPixelRatio(Math.min(devicePixelRatio,q==='high'?2:q==='med'?1.5:1));
 sun.shadow.mapSize.setScalar(q==='high'?4096:q==='med'?2048:1024);
 sun.shadow.map&&(sun.shadow.map.dispose(),sun.shadow.map=null);
 tg.instanceCount=Math.floor(NV*(q==='low'?0.4:0.8)*document.getElementById('traffic').value);
};

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);});

/* ---------------- animate ---------------- */
const clock=new THREE.Clock();
function tick(){
 requestAnimationFrame(tick);
 const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;
 uTime.value=t;
 uGlow.value+=(modeGlowTarget-uGlow.value)*Math.min(1,dt*0.35); // windows ignite progressively
 uNight.value+=(nightTarget-uNight.value)*dt*0.6;
 for(const lm of bridgeLights)lm.opacity+=(neckTarget-lm.opacity)*dt*0.7;

 // adaptive controls feel across zoom range
 const dist=camera.position.distanceTo(controls.target);
 controls.panSpeed=THREE.MathUtils.clamp(dist/4000,0.3,2.5);
 controls.rotateSpeed=THREE.MathUtils.clamp(dist/9000,0.25,0.8);

 if(flight){flight.t+=dt/3.2; const k=flight.t>=1?1:(1-Math.pow(1-flight.t,3));
  camera.position.lerpVectors(flight.p0,flight.p1,k);
  controls.target.lerpVectors(flight.t0,flight.t1,k);
  if(flight.t>=1)flight=null;}

 // boats
 for(const b of boats){
  if(b.harbor){b.ang+=b.sp*dt*10;const x=-1200+Math.cos(b.ang)*b.rad,z=-2200+Math.sin(b.ang)*b.rad*0.7;
   b.m.position.set(x,0,z);b.m.rotation.y=-b.ang+(b.sp>0?0:Math.PI);}
  else{b.z+=b.sp*dt; if(b.z>22500)b.z=-3000; if(b.z<-3000)b.z=22500;
   const zc=THREE.MathUtils.clamp(b.z,0,L);
   const x=b.east?eastEdge(zc)+b.off:westEdge(zc)-b.off;
   b.m.position.set(x,0,b.z); b.m.rotation.y=b.sp>0?Math.PI/2:-Math.PI/2;}
 }
 // helicopters
 for(const h of helis){h.t+=h.sp*dt*60;
  const z=(h.t*180)%24000-1500, zc=THREE.MathUtils.clamp(z,0,L);
  const x=h.west?westEdge(zc)-350:eastEdge(zc)+350;
  h.m.position.set(x,h.alt,z); h.m.rotation.y=Math.PI/2; h.m.children[1].rotation.z=t*30;}
 jet.position.x=9000-((t*90)%16000); jet.position.y=2200-((t*90)%16000)*0.06;
 // birds
 {const p=birds.geometry.attributes.position;for(let i=0;i<p.count;i++)
  p.setY(i,90+Math.sin(t*1.4+i)*35); p.needsUpdate=true;}
 // cloud shadows drift
 for(const c of clouds){c.position.x+=dt*22;c.position.z+=dt*9;if(c.position.x>5000){c.position.x=-5000;c.position.z=rr(0,L);}}

 controls.update();
 renderer.render(scene,camera);
}
tick();
</script>
<!-- viewer tweak: controls collapsed by default, arrow toggle -->
<style>
  #ui, #hint, #fps { transition: opacity .25s ease; }
  body.hud-off #ui, body.hud-off #hint, body.hud-off #fps {
    opacity: 0 !important; pointer-events: none !important; }
  #hudToggle { position: fixed; right: 10px; bottom: 10px; z-index: 99;
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.25); background: rgba(10,12,16,.55);
    color: rgba(255,255,255,.85); font: 13px/28px sans-serif; text-align: center;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    backdrop-filter: blur(4px); opacity: .5; transition: opacity .2s, transform .25s; }
  #hudToggle:hover { opacity: 1; }
  body:not(.hud-off) #hudToggle { transform: rotate(180deg); opacity: .8; }
</style>
<script>
(function () {
  document.body.classList.add('hud-off');
  var b = document.createElement('div');
  b.id = 'hudToggle';
  b.title = 'Show / hide controls';
  b.textContent = '▴';
  b.addEventListener('pointerdown', function (e) { e.stopPropagation(); });
  b.addEventListener('click', function (e) {
    e.stopPropagation();
    document.body.classList.toggle('hud-off');
  });
  document.body.appendChild(b);
})();
</script>

</body>
